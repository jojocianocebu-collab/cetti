                                <span className="text-[10px] bg-slate-100 border px-1.5 py-0.5 rounded font-mono text-slate-600">{inv.terms}</span>
                                <p className={`text-xs font-bold mt-1 ${inv.diffDays > 0 ? 'text-red-600' : 'text-slate-600'}`}>
                                Due: {inv.dueDate.toLocaleDateString()}
                                </p>
                            </td>
                            <td className="px-6 py-4">
                                {inv.diffDays > 0 ? (
                                <span className={`inline-flex items-center px-2 py-1 rounded-full text-xs font-bold ${inv.diffDays > 60 ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>
                                    {inv.diffDays} Days Overdue
                                </span>
                                ) : (
                                <span className="inline-flex items-center px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">
                                    Current
                                </span>
                                )}
                                <p className="text-[10px] text-slate-400 mt-1 uppercase font-bold">{inv.bucket}</p>
                            </td>
                            <td className="px-6 py-4 text-right">
                                <p className="font-bold text-slate-900">{formatPHP(inv.balance)}</p>
                                <p className="text-[10px] text-slate-400">Total: {formatPHP(inv.totalAmount)}</p>
                                {inv.paymentStatus === 'Partial' && <span className="text-[9px] font-bold text-blue-600 uppercase bg-blue-50 px-1 rounded">Partially Paid</span>}
                            </td>
                            <td className="px-6 py-4 text-right">
                                <button onClick={() => openPaymentModal(inv)} className="px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded hover:bg-blue-700 transition-colors shadow-sm">
                                    Record Pay
                                </button>
                            </td>
                            </tr>
                        ))}
                        {agingData.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400 italic">No outstanding invoices. Good job!</td></tr>}
                    </tbody>
                    </table>
                </div>
                </div>
            </div>
            );
        };

        const renderSettings = () => {
            const handleAddDistributor = () => {
            const val = distributorInputRef.current?.value;
            if (val && val.trim()) {
                const newDistributor = val.trim();
                // Prevent duplicate entries
                if (!distributors.includes(newDistributor)) {
                setDistributors([...distributors, newDistributor]);
                if (distributorInputRef.current) distributorInputRef.current.value = '';
                } 
                // Silently ignore duplicates or clear input to show action processed
                else if (distributorInputRef.current) {
                    distributorInputRef.current.select(); // Highlight for user to change
                }
            }
            };

            return (
            <div className="space-y-6">
                 {/* User Management Section (Admin Only) */}
                 {canManageUsers && (
                    <div className="bg-white rounded-xl border border-blue-200 shadow-sm p-6 mb-6">
                        <h3 className="text-lg font-bold text-blue-900 mb-4 flex items-center">
                            <UserCog size={20} className="mr-2 text-blue-600" />
                            User Management
                        </h3>
                        <p className="text-sm text-slate-500 mb-6">Manage system users, roles, and linked salesperson profiles.</p>
                        
                        <div className="mb-4">
                             <button onClick={openAddUserModal} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg text-sm hover:bg-blue-700 transition-colors flex items-center">
                                <Plus size={16} className="mr-2"/> Add User
                             </button>
                        </div>

                        <div className="overflow-x-auto border rounded-lg">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 text-slate-500 font-semibold border-b">
                                    <tr>
                                        <th className="px-4 py-3">Username</th>
                                        <th className="px-4 py-3">Full Name</th>
                                        <th className="px-4 py-3">Role</th>
                                        <th className="px-4 py-3">Linked Salesperson</th>
                                        <th className="px-4 py-3 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {users.map(u => (
                                        <tr key={u.id} className="hover:bg-slate-50">
                                            <td className="px-4 py-3 font-mono font-bold text-slate-700">{u.username}</td>
                                            <td className="px-4 py-3">{u.name}</td>
                                            <td className="px-4 py-3">
                                                <span className={`px-2 py-1 text-xs rounded-full font-bold border ${u.role === 'Admin' ? 'bg-purple-100 text-purple-700 border-purple-200' : (u.role === 'Manager' ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-blue-100 text-blue-700 border-blue-200')}`}>
                                                    {u.role}
                                                </span>
                                            </td>
                                            <td className="px-4 py-3 text-slate-500">{u.salespersonId ? getSalespersonName(u.salespersonId) : '-'}</td>
                                            <td className="px-4 py-3 text-right">
                                                <button onClick={() => openEditUserModal(u)} className="p-1 text-blue-600 hover:bg-blue-50 rounded mr-1"><Edit2 size={16}/></button>
                                                <button onClick={() => handleDeleteUser(u.id)} className="p-1 text-red-600 hover:bg-red-50 rounded"><Trash2 size={16}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                 )}

                 {/* Data Management Section */}
                 <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
                    <h3 className="text-lg font-bold text-slate-900 mb-4 flex items-center">
                        <Boxes size={20} className="mr-2 text-blue-600" />
                        Data Management
                    </h3>
                    <p className="text-sm text-slate-500 mb-6">Backup your system data to a file or restore from a previous backup. This allows you to transfer data between devices or save progress.</p>
                    
                    <div className="flex flex-col sm:flex-row gap-4">
                        <button 
                            onClick={handleBackupData}
                            className="flex items-center justify-center px-6 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-sm"
                        >
                            <Download size={18} className="mr-2" /> Download Backup (JSON)
                        </button>
                        
                        <div className="relative">
                            <input 
                                type="file" 
                                accept=".json" 
                                id="restore-file" 
                                className="hidden" 
                                onChange={handleRestoreData}
                            />
                            <label 
                                htmlFor="restore-file" 
                                className="flex items-center justify-center px-6 py-3 bg-white text-slate-700 border border-slate-300 font-bold rounded-lg hover:bg-slate-50 transition-colors shadow-sm cursor-pointer"
                            >
                                <Upload size={18} className="mr-2" /> Restore from Backup
                            </label>
                        </div>
                    </div>
                </div>

                {/* Company Branding Section */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
                    <h3 className="text-lg font-bold text-slate-900 mb-4 flex items-center">
                        <Settings size={20} className="mr-2 text-blue-600" />
                        Company Branding
                    </h3>
                    <div className="flex items-start space-x-6">
                        <div className="w-32 h-32 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center bg-slate-50 overflow-hidden relative">
                            {companyLogo ? (
                                <img src={companyLogo} alt="Company Logo" className="w-full h-full object-contain" />
                            ) : (
                                <div className="text-center p-4">
                                    <ImageIcon size={24} className="mx-auto text-slate-400 mb-2" />
                                    <span className="text-xs text-slate-400 font-medium">No Logo</span>
                                </div>
                            )}
                        </div>
                        <div className="flex-1">
                            <label className="block text-sm font-bold text-slate-700 mb-2">Upload Company Logo</label>
                            <p className="text-xs text-slate-500 mb-4">This logo will appear on all generated Quotations and Sales Orders. Recommended size: 300x100px.</p>
                            <input
                                type="file"
                                accept="image/*"
                                onChange={handleLogoUpload}
                                className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                            />
                            {companyLogo && (
                                <button onClick={() => setCompanyLogo(null)} className="mt-4 text-xs text-red-600 font-bold hover:underline">Remove Logo</button>
                            )}
                        </div>
                    </div>
                </div>

                {/* Distributor Management Section */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                <h3 className="text-lg font-bold text-slate-900 mb-4 flex items-center">
                    <Truck size={20} className="mr-2 text-blue-600" />
                    Distributor Management
                </h3>
                <p className="text-sm text-slate-500 mb-6">Manage the list of preferred distributors available when converting quotations to sales orders.</p>

                <div className="flex gap-2 mb-6">
                    <input 
                    type="text" 
                    placeholder="Enter distributor name" 
                    className="flex-1 px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 outline-none"
                    ref={distributorInputRef}
                    onKeyDown={(e) => e.key === 'Enter' && handleAddDistributor()}
                    />
                    <button 
                    onClick={handleAddDistributor}
                    className="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors"
                    >
                    Add
                    </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    {distributors.map((d, idx) => (
                    <div key={idx} className="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-lg group">
                        <span className="font-medium text-slate-700">{d}</span>
                        <button 
                        onClick={() => setDistributors(distributors.filter((_, i) => i !== idx))}
                        className="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"
                        >
                        <Trash2 size={16} />
                        </button>
                    </div>
                    ))}
                </div>
                </div>

                {/* System Management / Danger Zone - ADMIN ONLY */}
                {canResetData && (
                    <div className="bg-white rounded-xl border border-red-200 shadow-sm p-6 mt-6">
                        <h3 className="text-lg font-bold text-red-600 mb-4 flex items-center">
                            <AlertTriangle size={20} className="mr-2" />
                            Danger Zone
                        </h3>
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 p-4 bg-red-50 rounded-lg border border-red-100">
                            <div>
                                <p className="font-bold text-slate-900">Factory Reset / Clear Data</p>
                                <p className="text-sm text-slate-600 mt-1">Permanently delete all clients, inventory, quotes, deals, and sales orders. Use this to clear mock data after testing.</p>
                            </div>
                            <button 
                                onClick={handleFactoryReset}
                                className="px-6 py-3 bg-white text-red-600 border border-red-200 font-bold rounded-lg hover:bg-red-600 hover:text-white hover:border-red-600 transition-all flex items-center shadow-sm shrink-0"
                            >
                                <Trash2 size={18} className="mr-2" /> Reset System Data
                            </button>
                        </div>
                    </div>
                )}
            </div>
            );
        };

        // ==========================================
        // MAIN RETURN
        // ==========================================
        if (!currentUser) {
            return <LoginScreen onLogin={handleLogin} users={users} />;
        }

        return (
            <div className="min-h-screen bg-slate-50 flex font-sans text-slate-900 relative">
            <aside className={`bg-slate-900 h-screen sticky top-0 transition-all duration-300 flex flex-col print:hidden ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                <div className="p-6 flex items-center space-x-3 mb-6">
                    <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shrink-0"><Briefcase size={20} /></div>
                    {isSidebarOpen && <h1 className="text-xl font-bold text-white tracking-tight">CETTI CMS</h1>}
                </div>
                <nav className="flex-1 px-4 space-y-1">
                    <SidebarItem id="dashboard" icon={LayoutDashboard} label="Dashboard" />
                    <SidebarItem id="deals" icon={Briefcase} label="All Deals" />
                    <SidebarItem id="clients" icon={Users} label="Client List" />
                    <SidebarItem id="inventory" icon={Boxes} label="Inventory" />
                    <SidebarItem id="quotation" icon={FileText} label="Quotation Maker" />
                    <SidebarItem id="salesOrder" icon={ShoppingBag} label="Sales Orders" />
                    <SidebarItem id="ar" icon={Wallet} label="Account Receivables" />
                    <SidebarItem id="salesman" icon={Target} label="Salesforce" />
                    {canAccessSettings && <SidebarItem id="settings" icon={Settings} label="Settings" />}
                </nav>
                
                {/* User Profile in Sidebar */}
                <div className="p-4 border-t border-slate-800">
                    <div className="flex items-center space-x-3">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${currentUser.role === 'Admin' ? 'bg-purple-600 text-white' : 'bg-slate-700 text-slate-300'}`}>
                            {currentUser.username.charAt(0).toUpperCase()}
                        </div>
                        {isSidebarOpen && (
                            <div className="flex-1 min-w-0">
                                <p className="text-sm font-medium text-white truncate">{currentUser.name}</p>
                                <p className="text-xs text-slate-400 truncate">{currentUser.role}</p>
                            </div>
                        )}
                        {isSidebarOpen && (
                            <button onClick={handleLogout} className="text-slate-400 hover:text-white" title="Logout">
                                <LogOut size={16} />
                            </button>
                        )}
                    </div>
                </div>
            </aside>

            <main className={`flex-1 flex flex-col min-w-0 print:bg-white ${(isPreviewModalOpen || isSOPreviewModalOpen) ? 'print:hidden' : ''}`}>
                <header className="h-16 bg-white border-b flex items-center justify-between px-8 sticky top-0 z-20 print:hidden">
                <div className="flex items-center space-x-4">
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-all"><Menu size={20} /></button>
                    <h2 className="text-lg font-semibold capitalize">
                        {view === 'salesOrder' ? 'Sales Orders' : 
                        (view === 'salesman' ? 'Salesforce' : 
                        (view === 'quotation' ? 'Quotation Maker' : 
                        (view === 'ar' ? 'Account Receivables' :
                        (view === 'deals' ? 'All Deals' : view))))}
                    </h2>
                </div>
                </header>

                <div className="p-8 max-w-7xl mx-auto w-full print:p-0">
                {view === 'dashboard' && renderDashboard()}
                {view === 'deals' && renderDeals()}
                {view === 'clients' && renderClients()}
                {view === 'inventory' && renderInventory()}
                {view === 'quotation' && renderQuotationMaker()}
                {view === 'salesOrder' && renderSalesOrders()}
                {view === 'ar' && renderAR()}
                {view === 'salesman' && renderSalesman()}
                {view === 'settings' && canAccessSettings && renderSettings()}
                {view === 'profile' && selectedClient && (
                    <div className="space-y-6">
                    <button onClick={() => setView('clients')} className="flex items-center space-x-2 text-slate-500 hover:text-blue-600 font-medium text-sm">
                        <ChevronRight size={16} className="rotate-180" /> <span>Back to Clients</span>
                    </button>
                    <div className="bg-white p-8 rounded-xl border shadow-sm">
                        <div className="flex items-start justify-between">
                        <div className="flex items-center space-x-5">
                            <div className="w-20 h-20 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-3xl font-bold">{selectedClient.name.charAt(0)}</div>
                            <div>
                            <h2 className="text-2xl font-bold text-slate-900">{selectedClient.name}</h2>
                            <div className="flex items-center space-x-3 mt-1">
                                <span className="text-xs font-mono font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">ID: {selectedClient.id}</span>
                                <span className="text-slate-500 text-sm font-semibold">{selectedClient.category}</span>
                            </div>
                            </div>
                        </div>
                        </div>
                        
                        {/* Contact Persons Section */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <div className="bg-white p-6 rounded-xl border shadow-sm">
                            <h3 className="font-bold text-slate-900 mb-4 flex items-center"><User size={20} className="mr-2 text-blue-600"/> Contact Persons</h3>
                            <div className="space-y-4">
                                {selectedClient.contacts && selectedClient.contacts.length > 0 ? (
                                selectedClient.contacts.map((contact, idx) => (
                                    <div key={idx} className="flex items-start p-3 bg-slate-50 rounded-lg border border-slate-100">
                                        <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold mr-3 shrink-0">
                                        {contact.name.charAt(0)}
                                        </div>
                                        <div>
                                        <p className="font-bold text-slate-900 text-sm">{contact.name}</p>
                                        <div className="text-xs text-slate-500 space-y-0.5 mt-1">
                                            {contact.email && <p className="flex items-center"><Mail size={10} className="mr-1"/> {contact.email}</p>}
                                            {contact.phone && <p className="flex items-center"><Phone size={10} className="mr-1"/> {contact.phone}</p>}
                                            {contact.birthday && <p className="flex items-center"><Cake size={10} className="mr-1"/> {contact.birthday}</p>}
                                        </div>
                                        </div>
                                    </div>
                                ))
                                ) : (
                                <p className="text-slate-400 text-sm italic">No contacts listed.</p>
                                )}
                            </div>
                        </div>
                        </div>
                    </div>
                    </div>
                )}
                </div>
            </main>

            {/* MODALS */}

            {/* Add/Edit User Modal (Admin Only) */}
            {isUserModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in zoom-in duration-200">
                        <div className="px-6 py-4 border-b flex items-center justify-between">
                            <h3 className="font-bold text-lg">{editingUser ? 'Edit User' : 'Add New User'}</h3>
                            <button onClick={() => setIsUserModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                        </div>
                        <div className="p-6 space-y-4">
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Username</label>
                                <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={userFormData.username} onChange={e => setUserFormData({...userFormData, username: e.target.value})} disabled={editingUser && editingUser.username === 'admin'} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Password</label>
                                <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={userFormData.password} onChange={e => setUserFormData({...userFormData, password: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Full Name</label>
                                <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={userFormData.name} onChange={e => setUserFormData({...userFormData, name: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Role</label>
                                <select className="w-full px-3 py-2 border rounded-lg text-sm" value={userFormData.role} onChange={e => setUserFormData({...userFormData, role: e.target.value})} disabled={editingUser && editingUser.username === 'admin'}>
                                    {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Link Salesperson (Optional)</label>
                                <select className="w-full px-3 py-2 border rounded-lg text-sm" value={userFormData.salespersonId || ''} onChange={e => setUserFormData({...userFormData, salespersonId: e.target.value})}>
                                    <option value="">-- No Link --</option>
                                    {salesmen.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                                <p className="text-[10px] text-slate-400 mt-1">Links this user account to a salesperson profile for auto-filling forms.</p>
                            </div>
                        </div>
                        <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t">
                            <button onClick={() => setIsUserModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                            <button onClick={handleSaveUser} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">Save User</button>
                        </div>
                    </div>
                </div>
            )}

            {/* Forward to AR Modal */}
            {isForwardARModalOpen && forwardingSO && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in zoom-in duration-200">
                    <div className="px-6 py-4 border-b flex items-center justify-between">
                    <h3 className="font-bold text-lg">Generate Invoice & Forward to AR</h3>
                    <button onClick={() => setIsForwardARModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                    </div>
                    <div className="p-6 space-y-4">
                        <div className="bg-purple-50 p-3 rounded-lg border border-purple-200 mb-2">
                        <p className="text-xs font-bold text-purple-600 uppercase">Sales Order</p>
                        <p className="font-bold text-slate-900">{forwardingSO.id}</p>
                        <p className="text-xs text-slate-600 mt-1">{getClientName(forwardingSO.clientId)}</p>
                    </div>
                    
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Invoice Number (Reference)</label>
                        <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" placeholder="e.g. INV-2024-001" value={forwardARFormData.invoiceNumber} onChange={e => setForwardARFormData({...forwardARFormData, invoiceNumber: e.target.value})} />
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Invoice Date</label>
                        <input type="date" className="w-full px-3 py-2 border rounded-lg text-sm" value={forwardARFormData.invoiceDate} onChange={e => setForwardARFormData({...forwardARFormData, invoiceDate: e.target.value})} />
                        <p className="text-[10px] text-slate-400 mt-1">Aging will be calculated based on this date + client terms.</p>
                    </div>
                    </div>
                    <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t">
                    <button onClick={() => setIsForwardARModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                    <button onClick={handleForwardToAR} disabled={!forwardARFormData.invoiceNumber} className="px-4 py-2 bg-purple-600 text-white font-bold rounded-lg hover:bg-purple-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Process Invoice</button>
                    </div>
                </div>
                </div>
            )}

            {/* Payment Modal */}
            {isPaymentModalOpen && selectedInvoiceForPayment && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in zoom-in duration-200">
                    <div className="px-6 py-4 border-b flex items-center justify-between">
                    <h3 className="font-bold text-lg">Record Payment</h3>
                    <button onClick={() => setIsPaymentModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                    </div>
                    <div className="p-6 space-y-4">
                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 mb-2">
                        <p className="text-xs font-bold text-slate-500 uppercase">Invoice Ref</p>
                        <p className="font-bold text-slate-900">{selectedInvoiceForPayment.id}</p>
                        <p className="text-xs text-slate-500 mt-1">Balance Due: <span className="text-red-600 font-bold">{formatPHP(selectedInvoiceForPayment.totalAmount - (selectedInvoiceForPayment.amountPaid || 0))}</span></p>
                    </div>
                    
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Payment Amount</label>
                        <input type="number" className="w-full px-3 py-2 border rounded-lg text-sm font-bold text-green-600" value={paymentFormData.amount} onChange={e => setPaymentFormData({...paymentFormData, amount: e.target.value})} />
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Payment Date</label>
                        <input type="date" className="w-full px-3 py-2 border rounded-lg text-sm" value={paymentFormData.date} onChange={e => setPaymentFormData({...paymentFormData, date: e.target.value})} />
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Reference No. (Check/Trx)</label>
                        <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" placeholder="e.g. CHECK-12345" value={paymentFormData.reference} onChange={e => setPaymentFormData({...paymentFormData, reference: e.target.value})} />
                    </div>
                    </div>
                    <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t">
                    <button onClick={() => setIsPaymentModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                    <button onClick={handleRecordPayment} className="px-4 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition-colors">Confirm Payment</button>
                    </div>
                </div>
                </div>
            )}

            {/* Client Modal */}
            {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in duration-200 flex flex-col max-h-[90vh]">
                    <div className="px-6 py-4 border-b flex items-center justify-between shrink-0">
                    <h3 className="font-bold text-lg">{editingClient ? 'Edit Client' : 'Add New Client'}</h3>
                    <button onClick={() => setIsModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                    </div>
                    <div className="p-6 space-y-4 overflow-y-auto">
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Company Name</label>
                        <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Address</label>
                        <textarea className="w-full px-3 py-2 border rounded-lg text-sm" rows="2" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})}></textarea>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Category</label>
                        <select className="w-full px-3 py-2 border rounded-lg text-sm" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                            {CLIENT_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        </div>
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Payment Terms</label>
                        <select className="w-full px-3 py-2 border rounded-lg text-sm" value={formData.paymentTerms} onChange={e => setFormData({...formData, paymentTerms: e.target.value})}>
                            {PAYMENT_TERMS_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        </div>
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Assigned Salesperson</label>
                        <select className="w-full px-3 py-2 border rounded-lg text-sm" value={formData.assignedSalespersonId} onChange={e => setFormData({...formData, assignedSalespersonId: e.target.value})}>
                        {salesmen.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                    </div>

                    {/* Contact Persons Section */}
                    <div className="border-t pt-4 mt-2">
                        <div className="flex items-center justify-between mb-2">
                        <label className="text-xs font-bold text-slate-500 uppercase">Contact Persons</label>
                        <button onClick={addContactField} className="text-xs text-blue-600 font-bold hover:underline flex items-center"><Plus size={12} className="mr-1"/> Add Contact</button>
                        </div>
                        <div className="space-y-3">
                        {formData.contacts.map((contact, index) => (
                            <div key={index} className="flex gap-2 items-start bg-slate-50 p-2 rounded border border-slate-200">
                            <div className="grid grid-cols-2 gap-2 flex-1">
                                <input placeholder="Name" className="p-1.5 text-xs border rounded w-full" value={contact.name} onChange={(e) => updateContact(index, 'name', e.target.value)} />
                                <input placeholder="Email" className="p-1.5 text-xs border rounded w-full" value={contact.email} onChange={(e) => updateContact(index, 'email', e.target.value)} />
                                <input placeholder="Phone" className="p-1.5 text-xs border rounded w-full" value={contact.phone} onChange={(e) => updateContact(index, 'phone', e.target.value)} />
                                <input type="date" className="p-1.5 text-xs border rounded w-full text-slate-500" value={contact.birthday} onChange={(e) => updateContact(index, 'birthday', e.target.value)} />
                            </div>
                            <button onClick={() => removeContact(index)} className="text-slate-400 hover:text-red-500 mt-1 p-1 hover:bg-slate-200 rounded transition-colors" title="Remove Contact"><Trash2 size={14} /></button>
                            </div>
                        ))}
                        {formData.contacts.length === 0 && <p className="text-xs text-slate-400 italic text-center py-2">No contacts added.</p>}
                        </div>
                    </div>

                    </div>
                    <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t shrink-0">
                    <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                    <button onClick={handleSaveClient} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">Save Client</button>
                    </div>
                </div>
                </div>
            )}

            {/* Quotation Add/Edit Modal */}
            {isQuotationModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-3xl overflow-hidden animate-in zoom-in duration-200 flex flex-col max-h-[90vh]">
                    <div className="px-6 py-4 border-b flex items-center justify-between">
                    <h3 className="font-bold text-lg">{editingQuotation ? 'Edit Quotation' : 'New Quotation'}</h3>
                    <button onClick={() => setIsQuotationModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                    {/* Quote Header Info */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Select Client</label>
                        <select className="w-full px-3 py-2 border rounded-lg text-sm" value={quoFormData.clientId} onChange={e => setQuoFormData({...quoFormData, clientId: e.target.value})}>
                            <option value="">Select a Client</option>
                            {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                        </div>
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Assigned Salesperson</label>
                        <select className="w-full px-3 py-2 border rounded-lg text-sm" value={quoFormData.salespersonId} onChange={e => setQuoFormData({...quoFormData, salespersonId: e.target.value})}>
                            {salesmen.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                        </div>
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Date</label>
                        <input type="date" className="w-full px-3 py-2 border rounded-lg text-sm" value={quoFormData.date} onChange={e => setQuoFormData({...quoFormData, date: e.target.value})} />
                        </div>
                    </div>

                    {/* Item Selection */}
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <h4 className="font-bold text-sm text-slate-800 mb-3">Add Items from Inventory</h4>
                        <div className="relative mb-3">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                        <input type="text" placeholder="Search inventory to add..." className="w-full pl-9 pr-4 py-2 border rounded-lg text-sm" value={quoInventorySearch} onChange={e => setQuoInventorySearch(e.target.value)} />
                        </div>
                        {quoInventorySearch && (
                        <div className="max-h-40 overflow-y-auto space-y-2">
                            {inventory.filter(i => 
                            i.sku.toLowerCase().includes(quoInventorySearch.toLowerCase()) || 
                            i.description.toLowerCase().includes(quoInventorySearch.toLowerCase())
                            ).map(item => (
                            <div key={item.id} className="flex justify-between items-center bg-white p-2 rounded border border-slate-200 text-sm hover:border-blue-300 cursor-pointer" onClick={() => handleAddQuoItem(item)}>
                                <div className="truncate flex-1 pr-2">
                                    <span className="font-bold text-blue-600 block text-xs">{item.sku}</span>
                                    <span className="text-slate-600 text-xs">{item.description}</span>
                                </div>
                                <div className="text-right pl-2 shrink-0">

                                const client = clients.find(c => c.id === viewingQuotation.clientId);
                                const contact = client?.contacts?.[viewingQuotation.contactIndex || 0];
                                return (

                                        <div className="text-slate-600 whitespace-pre-wrap leading-tight max-w-[300px] mt-1">{client?.address}</div>
                                        {contact?.email && <p className="text-slate-500 mt-2 text-xs flex items-center"><Mail size={10} className="mr-1"/>{contact.email}</p>}

                                    </div>
                                );
                            })()}
                        </div>
                        <div className="flex-1 text-xs text-justify text-slate-600 pt-5">
                            <p className="mb-2 font-bold text-slate-900">Dear {(() => {
                                const client = clients.find(c => c.id === viewingQuotation.clientId);
                                const contact = client?.contacts?.[viewingQuotation.contactIndex || 0];
                                return contact?.name ? contact.name.split(' ')[0] : 'Sir/Madam';
                            })()},</p>
                            <p>
                                Thank you for giving <strong>CET Technologies Inc.</strong> the opportunity to present this proposal. 
                                We are pleased to submit our formal quotation for the following items/services, designed to support your business objectives.
                            </p>
                        </div>
                    </div>

                    {/* Items Table */}
                    <div className="mb-8">

                                <th className="py-3 px-2 font-bold text-slate-900 border-b border-slate-300">Description</th>
                                <th className="py-3 px-2 font-bold text-slate-900 text-center w-16 border-b border-slate-300">Qty</th>
                                <th className="py-3 px-2 font-bold text-slate-900 text-right w-28 border-b border-slate-300">Unit Price</th>
                                <th className="py-3 px-2 font-bold text-slate-900 text-right w-28 border-b border-slate-300">Amount</th>
                            </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">

                                const totalRevenue = viewingQuotation.totalAmount;
                                const markupMultiplier = totalLanded > 0 ? totalRevenue / totalLanded : 1;

                                return quoteItems.map((item, i) => {

                                        <td className="py-3 px-2 text-center text-slate-700 font-bold">{item.qty}</td>
                                        <td className="py-3 px-2 text-right font-medium text-slate-600">{formatPHP(unitPrice)}</td>
                                        <td className="py-3 px-2 text-right font-bold text-slate-900">{formatPHP(lineTotal)}</td>
                                        </tr>
                                    )
                                });
                            })()}
                            </tbody>

                            <span className="font-bold text-slate-500 text-xs">VAT (12%)</span>

                        </div>

                        </div>
                        </div>

                        <div className="grid grid-cols-2 gap-x-8 gap-y-2">
                            <ul className="list-disc pl-3 space-y-1">
                                <li><strong>Validity:</strong> This quotation is valid for 15 days from the date of issuance.</li>
                                <li><strong>Lead Time:</strong> 30-45 working days upon receipt of Purchase Order (PO).</li>
                                <li><strong>Warranty:</strong> Standard manufacturer warranty applies unless stated otherwise.</li>
                            </ul>
                            <ul className="list-disc pl-3 space-y-1">
                                <li><strong>Payment Terms:</strong> {clients.find(c => c.id === viewingQuotation.clientId)?.paymentTerms || 'Cash'}</li>
                                <li><strong>Bank Details:</strong> Checks payable to <span className="font-bold text-slate-900">CET TECHNOLOGIES INC.</span></li>
                                <li>Price includes 12% VAT.</li>
                            </ul>
                        </div>
                    </div>

                    {/* Closing & Signatories - Keep together */}
                    <div className="keep-together">
                        <p className="mb-8 text-xs text-slate-700">
                            Should you have any questions, please do not hesitate to contact the undersigned. We look forward to your favorable response.
                        </p>
                        
                        <div className="flex items-end justify-between pt-4">
                            <div>
                                <p className="mb-6 text-xs text-slate-700">Sincerely,</p>
                                {(() => {
                                    const salesman = salesmen.find(s => s.id === viewingQuotation.salespersonId);
                                    return (
                                        <div className="inline-block">
                                            {companyLogo && <div className="h-10 mb-[-15px] opacity-0">Spacer</div>}
                                            <p className="font-bold text-base text-slate-900 border-b border-slate-900 mb-1 pr-12 min-w-[200px] uppercase">
                                                {salesman?.name || 'ACCOUNT MANAGER'}
                                            </p>
                                            <p className="text-xs font-semibold text-slate-600">Account Manager</p>
                                            <p className="text-[10px] text-slate-500">CET Technologies Inc.</p>
                                        </div>

                                })()}

                                <p className="mb-10 text-xs text-slate-700 font-bold uppercase">Conforme:</p>
                                <div className="border-b border-slate-400 w-56 mb-1"></div>
                                <p className="text-[10px] text-slate-500 uppercase">Signature over Printed Name / Date</p>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
            )}

            {/* Sales Order Internal Print Preview Modal */}
            {isSOPreviewModalOpen && viewingSalesOrder && (

                <div className="flex items-center justify-between w-full max-w-[210mm] mb-6 print:hidden">

                    <button onClick={() => setIsSOPreviewModalOpen(false)} className="p-2 text-white/50 hover:text-white transition-all"><X size={32} /></button>
                    </div>
                </div>

                <div className="bg-white w-full max-w-[210mm] min-h-[297mm] h-auto shadow-2xl p-[15mm] block print:shadow-none print:w-full print:p-[15mm] print:h-auto animate-in slide-in-from-bottom-4 duration-300 font-sans relative">
                    
                    {/* Header with Dynamic Logo */}
                    <div className="flex justify-between items-start border-b-2 border-slate-800 pb-4 mb-6">
                    <div>
                        {companyLogo ? (
                            <img src={companyLogo} alt="Company Logo" className="h-12 w-auto object-contain mb-2" />

                            <div className="h-12 flex items-center text-slate-400 font-bold italic">NO LOGO</div>
                        )}
                        <h1 className="text-2xl font-black text-slate-900 uppercase tracking-tighter">Sales Order Breakdown</h1>
                        <p className="text-sm font-bold text-red-600 uppercase tracking-wider">Internal Use Only</p>
                    </div>
                    <div className="text-right pt-2">
                        <p className="font-bold text-xl text-slate-900">{viewingSalesOrder.id}</p>
                        <p className="text-xs text-slate-500">Date: {viewingSalesOrder.dateConverted}</p>

                    {/* Details Grid */}
                    <div className="grid grid-cols-2 gap-8 mb-8 text-sm">
                    <div className="space-y-1">
                        <p className="text-xs font-bold text-slate-400 uppercase">Client Information</p>

                        <p className="text-xs font-bold text-slate-400 uppercase">Fulfillment Details</p>
                        <p className="font-bold text-lg text-blue-700">{viewingSalesOrder.distributor}</p>
                        <p className="text-slate-600">Salesperson: {getSalespersonName(viewingSalesOrder.salespersonId)}</p>
                    </div>
                    </div>

                    {/* Financial Table */}
                    <div className="mb-6">
                    <table className="w-full text-left border-collapse border border-slate-200 text-[10px]">
                        <thead className="print:table-header-group">
                        <tr className="bg-slate-100 text-slate-800">
                            <th className="border border-slate-200 px-1 py-2 font-bold w-8 text-center">Qty</th>
                            <th className="border border-slate-200 px-2 py-2 font-bold">Item Description</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-20 bg-slate-50">Buy Cost</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-16 bg-slate-50">Freight</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-16 bg-slate-50">Svc</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-16 bg-slate-50">Inc</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-20 bg-slate-100">Landed</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-20">Unit SRP</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-right w-20 bg-green-50 text-green-800">GP Amt</th>
                            <th className="border border-slate-200 px-1 py-2 font-bold text-center w-12 bg-green-50 text-green-800">GP %</th>
                        </tr>
                        </thead>
                        <tbody className="print:table-row-group">
                        {(() => {
                            // Find the original quote to get line items and global costs
                            const quote = quotations.find(q => q.id === viewingSalesOrder.quoteId);
                            if (!quote) return <tr><td colSpan="10" className="text-center p-4">Original Quotation Data Not Found</td></tr>;

                            const totalLandedCost = quote.items.reduce((sum, item) => sum + (item.qty * item.landed), 0);
                            const markupFactor = totalLandedCost > 0 ? quote.totalAmount / totalLandedCost : 1;

                            return quote.items.map((item, i) => {
                            const unitSRP = item.landed * markupFactor;
                            const gpAmount = (unitSRP - item.landed) * item.qty;
                            const gpPercent = unitSRP > 0 ? ((unitSRP - item.landed) / unitSRP) * 100 : 0;

                            return (
                                <tr key={i} className="break-inside-avoid page-break-inside-avoid">
                                <td className="border border-slate-200 px-1 py-2 text-center">{item.qty}</td>
                                <td className="border border-slate-200 px-2 py-2">
                                    <p className="font-bold truncate max-w-[150px]">{item.description.split('\n')[0]}</p>
