    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Print Specific Styles */
        @media print {
            .no-print { display: none !important; }
            
            /* Global print adjustments */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                box-sizing: border-box !important;
            }

            body { 
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
            }

            /* Set safe margins for the printer */
            @page { 
                margin: 15mm 15mm 15mm 15mm; 
                size: A4; /* Set default to A4 */
            }
            
            /* Reset all layout containers to allow flow */
            #root, main {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                position: static !important;
            }

            /* Reset the specific print container */
            .print-container {
                width: 100% !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
                position: static !important;
                overflow: visible !important;
                background: white !important;
            }

            /* Table optimizations */
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            
            /* Block keeping utilities */
            .keep-together { break-inside: avoid; page-break-inside: avoid; }
            
            /* Font scaling for print legibility if needed */
            body { font-size: 10pt; }
        }
        
        /* Animation Utilities */
        .animate-in {
            animation: animateIn 0.2s ease-out forwards;
        }
        @keyframes animateIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

        const [quoFormData, setQuoFormData] = useState({
            clientId: '',
            salespersonId: '',
            contactIndex: 0,
            date: new Date().toISOString().split('T')[0],
            items: [],
            services: 0,
            incidentals: 0,
            commissions: 0,
            desiredGP: 20 // Default 20%
        });

        const formatPHP = (num) => new Intl.NumberFormat('en-PH', { 
            style: 'currency', currency: 'PHP', minimumFractionDigits: 0
        }).format(num);

        const getSalespersonName = (id) => salesmen.find(s => s.id === id)?.name || 'Unassigned';
        const getClientName = (id) => clients.find(c => c.id === id)?.name || 'Unknown Client';
        const getClientTerms = (id) => clients.find(c => c.id === id)?.paymentTerms || 'Cash';

        // Filters
        const filteredClients = useMemo(() => {
            return clients.filter(c => 
            c.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
            c.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            getSalespersonName(c.assignedSalespersonId).toLowerCase().includes(searchTerm.toLowerCase())
            );
        }, [clients, searchTerm, salesmen]);

        const filteredInventory = useMemo(() => {
            return inventory.filter(i => 
            i.sku.toLowerCase().includes(searchTerm.toLowerCase()) ||
            i.brandModel.toLowerCase().includes(searchTerm.toLowerCase()) ||
            i.description.toLowerCase().includes(searchTerm.toLowerCase())
            );
        }, [inventory, searchTerm]);

        const filteredQuos = useMemo(() => {
            return quotations.filter(q => 
            q.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
            getClientName(q.clientId).toLowerCase().includes(searchTerm.toLowerCase())
            );
        }, [quotations, searchTerm, clients]);

        const filteredSalesOrders = useMemo(() => {
            return salesOrders.filter(so => 
            so.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
            so.poNumber.toLowerCase().includes(searchTerm.toLowerCase()) ||
            getClientName(so.clientId).toLowerCase().includes(searchTerm.toLowerCase()) ||
            (so.invoiceNumber && so.invoiceNumber.toLowerCase().includes(searchTerm.toLowerCase()))
            );
        }, [salesOrders, searchTerm, clients]);

        const filteredDeals = useMemo(() => {
            return quotations.filter(q => 
            q.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
            getClientName(q.clientId).toLowerCase().includes(searchTerm.toLowerCase()) ||
            getSalespersonName(q.salespersonId).toLowerCase().includes(searchTerm.toLowerCase()) ||
            q.stage?.toLowerCase().includes(searchTerm.toLowerCase())
            );
        }, [quotations, searchTerm, clients, salesmen]);

        // Actions - Client
        const openAddModal = () => { 
            setEditingClient(null); 
            setFormData({ 
                name: '', 
                address: '', 
                category: 'Enterprise', 
                paymentTerms: 'Cash', 
                assignedSalespersonId: currentUser?.salespersonId || salesmen[0]?.id || '', 
                revenue: '₱0', 
                contacts: [{ name: '', email: '', phone: '', birthday: '' }] 
            }); 
            setIsModalOpen(true); 
        };
        const openEditModal = (client, e) => { e.stopPropagation(); setEditingClient(client); setFormData({ ...client, contacts: client.contacts || [{ name: '', email: '', phone: '', birthday: '' }] }); setIsModalOpen(true); };
        
        // Contact Management Helpers
        const addContactField = () => {
            setFormData({
            ...formData,
            contacts: [...formData.contacts, { name: '', email: '', phone: '', birthday: '' }]
            });
        };

        const updateContact = (index, field, value) => {
            const newContacts = [...formData.contacts];
            newContacts[index][field] = value;
            setFormData({ ...formData, contacts: newContacts });
        };

        const removeContact = (index) => {
            const newContacts = formData.contacts.filter((_, i) => i !== index);
            setFormData({ ...formData, contacts: newContacts.length ? newContacts : [] }); 
        };

        const handleSaveClient = () => {
            const cleanedContacts = formData.contacts.filter(c => c.name.trim() !== '');
            const cleanedFormData = { ...formData, contacts: cleanedContacts };

            if (editingClient) {
            setClients(clients.map(c => c.id === editingClient.id ? { ...cleanedFormData } : c));
            if (selectedClient?.id === editingClient.id) setSelectedClient({ ...cleanedFormData });
            } else {
            setClients([...clients, { ...cleanedFormData, id: `CET-${Math.floor(100000 + Math.random() * 900000)}`, projects: 0, joined: new Date().toISOString().split('T')[0] }]);
            }
            setIsModalOpen(false);
        };

        // Actions - Salesman
        const openAddSalesModal = () => { setEditingSalesman(null); setSalesFormData({ name: '', target: { month: 0, quarter: 0, ytd: 0 }, targetGP: { month: 0, quarter: 0, ytd: 0 } }); setIsSalesModalOpen(true); };
        const openEditSalesModal = (salesman) => { setEditingSalesman(salesman); setSalesFormData({ name: salesman.name, target: { ...salesman.target }, targetGP: { ...(salesman.targetGP || { month: 0, quarter: 0, ytd: 0 }) } }); setIsSalesModalOpen(true); };
        const handleSaveSalesman = () => {
            if (editingSalesman) {
            setSalesmen(salesmen.map(s => s.id === editingSalesman.id ? { 
                ...s, 
                name: salesFormData.name, 
                target: { ...salesFormData.target },
                targetGP: { ...salesFormData.targetGP }
            } : s));
            } else {
            setSalesmen([...salesmen, { 
                id: 's' + Date.now(), 
                name: salesFormData.name, 
                target: { ...salesFormData.target }, 
                targetGP: { ...salesFormData.targetGP },
                actual: { month: 0, quarter: 0, ytd: 0 }, 
                gp: { month: 0, quarter: 0, ytd: 0 }, 
                deals: 0 
            }]);
            }
            setIsSalesModalOpen(false);
        };
        const handleDeleteSalesman = (id) => { if (window.confirm('Delete this salesperson?')) setSalesmen(salesmen.filter(s => s.id !== id)); };

        // Actions - Inventory
        const openAddInventoryModal = () => { setEditingInventory(null); setInventoryFormData({ sku: '', brandModel: '', description: '', qty: 0, buyCost: 0, freight: 0, services: 0, incidentals: 0 }); setIsInventoryModalOpen(true); };
        const openEditInventoryModal = (item) => { setEditingInventory(item); setInventoryFormData({ ...item }); setIsInventoryModalOpen(true); };
        const handleSaveInventory = () => {
            if (editingInventory) {
            setInventory(inventory.map(i => i.id === editingInventory.id ? { ...inventoryFormData } : i));
            } else {
            setInventory([...inventory, { ...inventoryFormData, id: `CET-INV-${Math.floor(100000 + Math.random() * 900000)}` }]);
            }
            setIsInventoryModalOpen(false);
        };
        const handleDeleteInventory = (id) => { if (window.confirm('Delete this inventory item?')) setInventory(inventory.filter(i => i.id !== id)); };

        // Actions - Quotation
        const openAddQuotationModal = () => {
            setEditingQuotation(null);
            setQuoInventorySearch(''); // Reset search
            setQuoFormData({
            clientId: clients[0]?.id || '',
            salespersonId: currentUser?.salespersonId || salesmen[0]?.id || '', // Auto-select current user if linked
            contactIndex: 0,
            date: new Date().toISOString().split('T')[0],
            items: [],
            services: 0,
            incidentals: 0,
            commissions: 0,
            desiredGP: 20
            });
            setIsQuotationModalOpen(true);
        };

        const openEditQuotationModal = (quo) => {
            setEditingQuotation(quo);
            setQuoInventorySearch(''); // Reset search
            setQuoFormData({
            clientId: quo.clientId,
            salespersonId: quo.salespersonId,
            contactIndex: quo.contactIndex || 0,
            date: quo.date,
            items: [...quo.items],
            services: quo.services || 0,
            incidentals: quo.incidentals || 0,
            commissions: quo.commissions || 0,
            desiredGP: quo.desiredGP || 20
            });
            setIsQuotationModalOpen(true);
        };

        const handleAddQuoItem = (item) => {
            const landedPrice = item.buyCost + item.freight + item.services + item.incidentals;
            setQuoFormData({
            ...quoFormData,
            items: [...quoFormData.items, { 
                sku: item.sku, 
                description: `${item.brandModel}\n${item.description}`, 
                qty: 1, 
                buyCost: item.buyCost,
                freight: item.freight,
                services: item.services,
                incidentals: item.incidentals,
                unitPrice: landedPrice, 
                landed: landedPrice
            }]
            });
        };

        const calculateQuoTotals = () => {
            const itemsCost = quoFormData.items.reduce((sum, item) => sum + (item.qty * item.landed), 0);
            const totalCosts = itemsCost + parseFloat(quoFormData.services || 0) + parseFloat(quoFormData.incidentals || 0) + parseFloat(quoFormData.commissions || 0);
            
            // Margin calculation: Price = Cost / (1 - GP%)
            const gpPercentage = parseFloat(quoFormData.desiredGP || 0) / 100;
            // Cap GP percentage at 99.9% to avoid division by zero or negative results
            const safeGPPercentage = Math.min(gpPercentage, 0.999);
            
            const finalAmount = totalCosts / (1 - safeGPPercentage);
            const calculatedGPAmount = finalAmount - totalCosts;
            
            return { itemsCost, totalCosts, finalAmount, calculatedGPAmount };
        };

        const handleSaveQuotation = () => {
            const { finalAmount } = calculateQuoTotals();
            
            if (editingQuotation) {
            setQuotations(quotations.map(q => q.id === editingQuotation.id ? {
                ...q,
                ...quoFormData,
                totalAmount: finalAmount
            } : q));
            } else {
            const newQuo = {
                ...quoFormData,
                id: `CET-QUO-${Math.floor(100000 + Math.random() * 900000)}`,
                totalAmount: finalAmount,
                status: 'Draft',
                stage: 'Active', // Default Stage ensures it appears in Deals/Pipeline
                targetClosing: '', // Default Empty
                remarks: '' // Initialize remarks
            };
            setQuotations([newQuo, ...quotations]);
            }
            setIsQuotationModalOpen(false);
        };

        const handlePrintQuote = () => {
            window.print();
        };

        // Actions - Sales Order Conversion
        const openConvertModal = (quo) => {
            setConvertingQuote(quo);
            setConvertFormData({ poNumber: '', distributor: '' });
            setIsConvertModalOpen(true);
        };

        const handleConvertToSO = () => {
            if (!convertingQuote || !convertFormData.poNumber || !convertFormData.distributor) return;

            const newSO = {
            id: `CET-SO-${Math.floor(100000 + Math.random() * 900000)}`,
            quoteId: convertingQuote.id,
            clientId: convertingQuote.clientId,
            salespersonId: convertingQuote.salespersonId,
            poNumber: convertFormData.poNumber,
            distributor: convertFormData.distributor,
            totalAmount: convertingQuote.totalAmount,
            dateConverted: new Date().toISOString().split('T')[0],
            status: 'Pending Fulfillment',
            invoiceNumber: '',
            invoiceDate: '',
            paymentStatus: 'Unpaid',
            amountPaid: 0
            };

            setSalesOrders([newSO, ...salesOrders]);
            
            // Update quote status and stage
            setQuotations(quotations.map(q => q.id === convertingQuote.id ? { ...q, status: 'Converted', stage: 'Won' } : q));
            
            setIsConvertModalOpen(false);
            setConvertingQuote(null);
            setView('salesOrder'); // Redirect to Sales Order View
        };

        const openSOPreview = (so) => {
            setViewingSalesOrder(so);
            setIsSOPreviewModalOpen(true);
        }

        // Forward to AR Action
        const openForwardARModal = (so) => {
            setForwardingSO(so);
            setForwardARFormData({
            invoiceNumber: '',
            invoiceDate: new Date().toISOString().split('T')[0]
            });
            setIsForwardARModalOpen(true);
        };

        const handleForwardToAR = () => {
            if (!forwardingSO || !forwardARFormData.invoiceNumber) return;

            setSalesOrders(salesOrders.map(so => so.id === forwardingSO.id ? {
            ...so,
            status: 'Invoiced',
            invoiceNumber: forwardARFormData.invoiceNumber,
            invoiceDate: forwardARFormData.invoiceDate
            } : so));

            setIsForwardARModalOpen(false);
            setForwardingSO(null);
        };

        // Deal Management
        const openEditDealModal = (deal) => {
            setEditingDeal(deal);
            setDealFormData({
                stage: deal.stage || 'Active',
                targetClosing: deal.targetClosing || '',
                remarks: deal.remarks || ''
            });
            setIsDealModalOpen(true);
        };

        const handleSaveDeal = () => {
            if (!editingDeal) return;
            setQuotations(quotations.map(q => q.id === editingDeal.id ? {
                ...q,
                stage: dealFormData.stage,
                targetClosing: dealFormData.targetClosing,
                remarks: dealFormData.remarks
            } : q));
            setIsDealModalOpen(false);
        }

        // Payment Management (AR)
        const openPaymentModal = (invoice) => {
            setSelectedInvoiceForPayment(invoice);
            setPaymentFormData({
            amount: invoice.totalAmount - (invoice.amountPaid || 0),
            date: new Date().toISOString().split('T')[0],
            reference: '',
            notes: ''
            });
            setIsPaymentModalOpen(true);
        };

        const handleRecordPayment = () => {
            if(!selectedInvoiceForPayment) return;
            
            const paymentAmount = parseFloat(paymentFormData.amount) || 0;
            const currentPaid = selectedInvoiceForPayment.amountPaid || 0;
            const totalAmount = selectedInvoiceForPayment.totalAmount;
            const newTotalPaid = currentPaid + paymentAmount;
            
            let newStatus = 'Unpaid';
            if (newTotalPaid >= totalAmount) newStatus = 'Paid';
            else if (newTotalPaid > 0) newStatus = 'Partial';

            setSalesOrders(salesOrders.map(so => so.id === selectedInvoiceForPayment.id ? {
            ...so,
            amountPaid: newTotalPaid,
            paymentStatus: newStatus
            } : so));

            setIsPaymentModalOpen(false);
            setSelectedInvoiceForPayment(null);
        }

        const handleLogoUpload = (event) => {
            const file = event.target.files[0];
            if (file) {
            const reader = new FileReader();
            reader.onloadend = () => {
                setCompanyLogo(reader.result);
            };
            reader.readAsDataURL(file);
            }
        };

        // Helper for Deal GP Calc
        const calculateDealMetrics = (quote) => {
            const totalLandedCost = quote.items.reduce((sum, item) => sum + (item.qty * item.landed), 0);
            const globalCosts = parseFloat(quote.services || 0) + parseFloat(quote.incidentals || 0) + parseFloat(quote.commissions || 0);
            const totalCost = totalLandedCost + globalCosts;
            const gp = quote.totalAmount - totalCost;
            const gpPercent = quote.totalAmount > 0 ? (gp / quote.totalAmount) * 100 : 0;
            return { totalCost, gp, gpPercent };
        };

        // AR Helpers
        const getTermDays = (termStr) => {
            if (!termStr || termStr === 'Cash') return 0;
            const match = termStr.match(/(\d+)/);
            return match ? parseInt(match[0]) : 0;
        };

        const isDateInThisMonth = (dateString) => {
            if (!dateString) return false;
            const date = new Date(dateString);
            const today = new Date();
            return date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
        };

        const isDateInThisQuarter = (dateString) => {
            if (!dateString) return false;
            const date = new Date(dateString);
            const today = new Date();
            const currentQuarter = Math.floor(today.getMonth() / 3);
            const dateQuarter = Math.floor(date.getMonth() / 3);
            return dateQuarter === currentQuarter && date.getFullYear() === today.getFullYear();
        };

        // Generic Date Filter
        const checkDate = (dateStr, timeframe) => {
            if (!dateStr) return false;
            const date = new Date(dateStr);
            const today = new Date();
            
            if (timeframe === 'all') return true;
            if (timeframe === 'month') {
                return date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
            }
            if (timeframe === 'quarter') {
                const q = Math.floor(today.getMonth() / 3);
                const dq = Math.floor(date.getMonth() / 3);
                return q === dq && date.getFullYear() === today.getFullYear();
            }
            if (timeframe === 'ytd') {
                return date.getFullYear() === today.getFullYear();
            }
            return false;
        };

        const calculateAging = (invoice) => {
            const terms = getClientTerms(invoice.clientId);
            const daysTerm = getTermDays(terms);
            
            // Use Invoice Date if available (Invoiced status), otherwise fallback to creation date
            const baseDate = invoice.invoiceDate ? new Date(invoice.invoiceDate) : new Date(invoice.dateConverted);
            const dueDate = new Date(baseDate);
            dueDate.setDate(baseDate.getDate() + daysTerm);
            
            const today = new Date();
            const diffTime = today - dueDate;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let bucket = 'Current';
            if (diffDays > 90) bucket = '> 90 Days';
            else if (diffDays > 60) bucket = '61-90 Days';
            else if (diffDays > 30) bucket = '31-60 Days';
            else if (diffDays > 0) bucket = '1-30 Days';
            
            return { dueDate, diffDays, bucket, terms };
        };

        // UI Components
        const SidebarItem = ({ id, icon: Icon, label }) => (
            <button onClick={() => { setView(id); setSearchTerm(''); }} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${view === id ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
            <Icon size={20} />
            {isSidebarOpen && <span className="font-medium">{label}</span>}
            </button>
        );

        const StatCard = ({ label, value, trend, icon: Icon, color, subValue }) => (
            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
            <div className="flex items-center justify-between mb-4">
                <div className={`p-2 rounded-lg ${color} bg-opacity-10 text-${color.split('-')[1]}-600`}>
                <Icon size={24} />
                </div>
                {trend && <span className={`text-sm font-medium ${trend.startsWith('+') ? 'text-green-600' : 'text-slate-500'}`}>{trend}</span>}
            </div>
            <h3 className="text-slate-500 text-sm font-bold uppercase tracking-wide">{label}</h3>
            <p className="text-2xl font-bold text-slate-900 mt-1">{value}</p>
            {subValue && <p className="text-xs text-slate-400 font-medium mt-1">{subValue}</p>}
            </div>
        );

        // ==========================================
        // RENDERS - SEQUENCED ONCE WITHOUT DUPLICATION
        // ==========================================

        const renderDashboard = () => {
            // 1. Total Revenue (Converted Sales Orders in timeframe)
            const filteredRevenueSOs = salesOrders.filter(so => checkDate(so.dateConverted, dashboardTimeframe));
            const revenue = filteredRevenueSOs.reduce((sum, so) => sum + so.totalAmount, 0);

            // 2. Gross Profit % and Amount (From Converted SOs)
            let totalCost = 0;
            filteredRevenueSOs.forEach(so => {
                const quote = quotations.find(q => q.id === so.quoteId);
                if (quote) {
                    const metrics = calculateDealMetrics(quote);
                    totalCost += metrics.totalCost;
                }
            });
            const grossProfitAmount = revenue - totalCost;
            const grossProfitPercent = revenue > 0 ? (grossProfitAmount / revenue) * 100 : 0;

            // 3. Total Pipeline (All Quotations Created in timeframe)
            const filteredPipelineQuotes = quotations.filter(q => checkDate(q.date, dashboardTimeframe));
            const pipelineValue = filteredPipelineQuotes.reduce((sum, q) => sum + q.totalAmount, 0);

            // 4. Forecast Deals (Active Deals Closing in timeframe)
            const filteredForecastDeals = quotations.filter(q => 
                q.stage !== 'Won' && 
                q.stage !== 'Lost' && 
                q.status !== 'Converted' && 
                checkDate(q.targetClosing, dashboardTimeframe)
            );
            const forecastValue = filteredForecastDeals.reduce((sum, q) => sum + q.totalAmount, 0);

            // 5. Active Deals (Qty) - Same set as Forecast
            const activeDealsCount = filteredForecastDeals.length;

            // 6. Active Orders (Amount & Qty) - Converted but not Invoiced (Generated in timeframe)
            const filteredActiveOrders = salesOrders.filter(so => 
                so.status !== 'Invoiced' && 
                checkDate(so.dateConverted, dashboardTimeframe)
            );
            const activeOrdersValue = filteredActiveOrders.reduce((sum, so) => sum + so.totalAmount, 0);
            const activeOrdersCount = filteredActiveOrders.length;

            // 7. Total Invoiced (Sales Orders converted to AR / Invoiced)
            const filteredInvoicedSOs = salesOrders.filter(so => 
                so.status === 'Invoiced' && 
                checkDate(so.invoiceDate, dashboardTimeframe)
            );
            const totalInvoiced = filteredInvoicedSOs.reduce((sum, so) => sum + so.totalAmount, 0);

            // 8. Birthday Logic
            const currentMonthIndex = new Date().getMonth();
            const currentMonthName = new Date().toLocaleString('default', { month: 'long' });
            
            const upcomingBirthdays = clients.flatMap(c => 
                (c.contacts || []).filter(contact => {
                    if(!contact.birthday) return false;
                    const bday = new Date(contact.birthday);
                    return bday.getMonth() === currentMonthIndex;
                }).map(contact => ({
                    ...contact,
                    clientName: c.name,
                    day: new Date(contact.birthday).getDate()
                }))
            ).sort((a,b) => a.day - b.day);


            return (
            <div className="space-y-6">
                {/* Dashboard Header with Filter */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-900">Performance Dashboard</h2>
                        <p className="text-sm text-slate-500">Overview of key metrics and performance indicators.</p>
                    </div>
                    <div className="flex bg-white rounded-lg border border-slate-200 p-1">
                        {['month', 'quarter', 'ytd', 'all'].map(tf => (
                            <button 
                                key={tf} 
                                onClick={() => setDashboardTimeframe(tf)}
                                className={`px-4 py-2 text-xs font-bold uppercase rounded-md transition-all ${dashboardTimeframe === tf ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}
                            >
                                {tf === 'all' ? 'All Time' : (tf === 'ytd' ? 'Year to Date' : `This ${tf.charAt(0).toUpperCase() + tf.slice(1)}`)}
                            </button>
                        ))}
                    </div>
                </div>

                {/* Metrics Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <StatCard 
                        label="Total Revenue" 
                        value={formatPHP(revenue)} 
                        icon={DollarSign} 
                        color="bg-green-500" 
                        trend="Booked Sales"
                    />
                    <StatCard 
                        label="Total Invoiced" 
                        value={formatPHP(totalInvoiced)} 
                        subValue="Billed to Client"
                        icon={FileCheck} 
                        color="bg-purple-500"
                        trend="Realized Revenue" 
                    />
                    <StatCard 
                        label="Gross Profit" 
                        value={formatPHP(grossProfitAmount)} 
                        subValue={`${grossProfitPercent.toFixed(1)}% Margin`}
                        icon={PieChart} 
                        color="bg-emerald-500"
                        trend="Profitability" 
                    />
                    <StatCard 
                        label="Active Orders" 
                        value={formatPHP(activeOrdersValue)} 
                        subValue={`${activeOrdersCount} Pending Fulfillment`}
                        icon={ShoppingBag} 
                        color="bg-amber-500"
                        trend="Backlog"
                    />
                    <StatCard 
                        label="Total Quote Value" 
                        value={formatPHP(pipelineValue)} 
                        subValue={`${filteredPipelineQuotes.length} Quotes Created`}
                        icon={FilePlus} 
                        color="bg-blue-500"
                        trend="Quote Volume"
                    />
                    <StatCard 
                        label="Forecast (Commit)" 
                        value={formatPHP(forecastValue)} 
                        subValue="Targeting Close"
                        icon={Target} 
                        color="bg-indigo-500"
                        trend="Pipeline Commit"
                    />
                    <StatCard 
                        label="Active Deals" 
                        value={activeDealsCount} 
                        subValue="Open Opportunities"
                        icon={Briefcase} 
                        color="bg-slate-500"
                        trend="Deal Count"
                    />
                </div>

                {/* Dashboard Highlights Row */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                     {/* Birthdays Card */}
                     <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                        <div className="p-4 border-b bg-gradient-to-r from-pink-50 to-white flex justify-between items-center">
                            <h3 className="font-bold text-slate-800 flex items-center">
                                <Cake size={20} className="mr-2 text-pink-500"/> 
                                {currentMonthName} Birthdays
                            </h3>
                             <span className="text-xs font-bold bg-white border border-pink-100 text-pink-600 px-2 py-1 rounded-full shadow-sm">{upcomingBirthdays.length}</span>
                        </div>
                        <div className="flex-1 overflow-y-auto max-h-[300px] p-0">
                            {upcomingBirthdays.length > 0 ? (
                                <table className="w-full text-left">

                                                    <div className="flex items-center">
                                                        <div className="flex flex-col items-center justify-center w-10 h-10 rounded-lg bg-pink-100 text-pink-600 mr-3 border border-pink-200 shrink-0">
                                                            <span className="text-[10px] uppercase font-bold">{currentMonthName.substring(0,3)}</span>
                                                            <span className="text-sm font-black leading-none">{b.day}</span>
                                                        </div>
                                                        <div className="min-w-0">
                                                            <p className="text-sm font-bold text-slate-900 truncate">{b.name}</p>
                                                            <p className="text-xs text-slate-500 truncate">{b.clientName}</p>
                                                        </div>
                                                    </div>

                                                <td className="px-4 py-3 text-right">

                                    </div>
                                    <p className="text-slate-500 font-medium text-sm">No birthdays this month.</p>
                                    <p className="text-xs text-slate-400 mt-1">Add birthdays to client contacts to see them here.</p>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* Activity Feed to balance layout */}
                    <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                         <div className="p-4 border-b flex justify-between items-center bg-slate-50/50">
                            <h3 className="font-bold text-slate-800 flex items-center">
                                <Clock size={20} className="mr-2 text-blue-500"/> 
                                Recent Activity Stream
                            </h3>
                        </div>
                        <div className="overflow-x-auto">
                             <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 text-slate-500 border-b border-slate-100">
                                    <tr>
                                        <th className="px-6 py-3 font-semibold text-xs uppercase w-24">Type</th>
                                        <th className="px-6 py-3 font-semibold text-xs uppercase">Reference</th>
                                        <th className="px-6 py-3 font-semibold text-xs uppercase">Client</th>
                                        <th className="px-6 py-3 font-semibold text-xs uppercase text-right">Date</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {(() => {
                                        const activities = [
                                            ...salesOrders.map(so => ({type: 'Sales Order', id: so.id, client: getClientName(so.clientId), date: so.dateConverted, icon: ShoppingBag, color: 'purple'})),
                                            ...quotations.map(q => ({type: 'Quotation', id: q.id, client: getClientName(q.clientId), date: q.date, icon: FileText, color: 'blue'}))
                                        ].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
                                        
                                        if (activities.length === 0) return <tr><td colSpan="4" className="p-8 text-center text-slate-400 italic">No recent activity.</td></tr>;

                                        return activities.map((act, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-3">
                                                    <span className={`inline-flex items-center text-[10px] font-bold px-2 py-1 rounded-md border ${act.color === 'purple' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                                                        <act.icon size={10} className="mr-1.5"/> {act.type}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-3">
                                                    <span className="font-mono text-xs font-bold text-slate-700">{act.id}</span>
                                                </td>
                                                <td className="px-6 py-3 text-slate-600 font-medium">{act.client}</td>
                                                <td className="px-6 py-3 text-right text-slate-500 text-xs font-mono">{act.date}</td>

                                        ));
                                    })()}
                                </tbody>
                             </table>
                        </div>
                    </div>
                </div>
            </div>
            );
        };

        const renderDeals = () => {
            const activeDeals = filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost');
            const wonDeals = filteredDeals.filter(d => d.stage === 'Won');
            const totalPipeline = activeDeals.reduce((sum, d) => sum + d.totalAmount, 0);
            
            // Calculate Commits
            const commitMonth = activeDeals
                .filter(d => isDateInThisMonth(d.targetClosing))
                .reduce((sum, d) => sum + d.totalAmount, 0);

            const commitQuarter = activeDeals
                .filter(d => isDateInThisQuarter(d.targetClosing))
                .reduce((sum, d) => sum + d.totalAmount, 0);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <StatCard label="Commit (This Month)" value={formatPHP(commitMonth)} icon={Target} color="bg-green-600" />
                        <StatCard label="Commit (This Quarter)" value={formatPHP(commitQuarter)} icon={BarChart4} color="bg-blue-600" />
                        <StatCard label="Total Pipeline Value" value={formatPHP(totalPipeline)} icon={Briefcase} color="bg-slate-500" />
                        <StatCard label="Deals Won (YTD)" value={wonDeals.length} icon={Trophy} color="bg-amber-500" />
                    </div>

                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-4 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                            <div className="relative flex-1 max-w-md">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input type="text" placeholder="Search Deal, Client, Stage..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setIsReportModalOpen(true)} className="flex items-center space-x-2 px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium hover:bg-slate-900 shadow-sm transition-all">
                                <FileText size={18} /> <span>Forecast Report</span>
                            </button>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Deal Info</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Salesperson</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Stage</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Target Closing</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Total Revenue</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Gross Profit (GP)</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredDeals.map(deal => {
                                        const metrics = calculateDealMetrics(deal);
                                        const isClosingSoon = isDateInThisMonth(deal.targetClosing);
                                        
                                        return (
                                            <tr key={deal.id} className={`hover:bg-slate-50 transition-colors ${isClosingSoon ? 'bg-green-50/30' : ''}`}>
                                                <td className="px-6 py-4">
                                                    <p className="text-sm font-bold text-slate-900">{getClientName(deal.clientId)}</p>
                                                    <div className="flex items-center mt-1">
                                                        <p className="text-[10px] text-slate-400 font-mono mr-2">{deal.id}</p>
                                                        {deal.remarks && (
                                                            <span className="text-[10px] text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded flex items-center" title={deal.remarks}>
                                                                <StickyNote size={10} className="mr-1"/> Note
                                                            </span>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 text-sm text-slate-600">
                                                    {getSalespersonName(deal.salespersonId)}
                                                </td>
                                                <td className="px-6 py-4">
                                                    <span className={`px-2 py-1 rounded-full text-[10px] font-bold uppercase border 
                                                        ${deal.stage === 'Won' ? 'bg-green-100 text-green-700 border-green-200' : 
                                                        deal.stage === 'Lost' ? 'bg-red-100 text-red-700 border-red-200' : 
                                                        deal.stage === 'Negotiation' ? 'bg-amber-100 text-amber-700 border-amber-200' : 
                                                        'bg-blue-100 text-blue-700 border-blue-200'}`}>
                                                        {deal.stage || 'Active'}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    {deal.targetClosing ? (
                                                        <div className={`flex items-center text-sm font-bold ${isClosingSoon ? 'text-green-700' : 'text-slate-700'}`}>
                                                            <Calendar size={14} className={`mr-2 ${isClosingSoon ? 'text-green-600' : 'text-slate-400'}`} />
                                                            {new Date(deal.targetClosing).toLocaleDateString()}
                                                        </div>
                                                    ) : (
                                                        <span className="text-xs text-slate-400 italic">Not Set</span>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 text-sm font-bold text-slate-900">
                                                    {formatPHP(deal.totalAmount)}
                                                </td>
                                                <td className="px-6 py-4">
                                                    <p className="text-sm font-bold text-green-600">{formatPHP(metrics.gp)}</p>
                                                    <p className="text-[10px] font-bold text-slate-500">{metrics.gpPercent.toFixed(1)}%</p>
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    <button onClick={() => openEditDealModal(deal)} className="p-2 text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-blue-50 rounded-lg transition-colors" title="Update Deal & Add Remarks">
                                                        <Edit2 size={16} />
                                                    </button>
                                                </td>
                                            </tr>
                                        )
                                    })}
                                    {filteredDeals.length === 0 && <tr><td colSpan="7" className="p-8 text-center text-slate-400">No deals found.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const renderClients = () => (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="p-4 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div className="relative flex-1 max-w-md">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                <input type="text" placeholder="Search ID, Name, Salesperson..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>
                <button onClick={openAddModal} className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm transition-all"><UserPlus size={18} /> <span>Add Client</span></button>
            </div>
            <div className="overflow-x-auto">
                <table className="w-full text-left">
                <thead>
                    <tr className="bg-slate-50 border-b border-slate-200">
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Unique ID</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Client & Salesperson</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Terms</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Revenue</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th>
                    </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                    {filteredClients.map((client) => (
                    <tr key={client.id} className="hover:bg-slate-50 transition-colors cursor-pointer group" onClick={() => { setSelectedClient(client); setView('profile'); }}>
                        <td className="px-6 py-4"><span className="text-xs font-mono font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded w-fit"><Fingerprint size={12} className="inline mr-1" />{client.id}</span></td>
                        <td className="px-6 py-4">
                        <p className="font-semibold text-slate-900">{client.name}</p>
                        <p className="text-[10px] text-slate-500 font-medium flex items-center mt-1 uppercase"><User size={10} className="mr-1" />{getSalespersonName(client.assignedSalespersonId)} • {client.category}</p>
                        </td>
                        <td className="px-6 py-4"><span className="text-xs font-semibold px-2 py-1 bg-slate-100 rounded border">{client.paymentTerms}</span></td>
                        <td className="px-6 py-4 text-sm font-semibold">{client.revenue}</td>
                        <td className="px-6 py-4 text-right">
                        <div className="flex justify-end space-x-1 opacity-0 group-hover:opacity-100">
                            <button onClick={(e) => openEditModal(client, e)} className="p-2 text-slate-400 hover:text-blue-600"><Edit2 size={16} /></button>
                            {canDelete && <button onClick={(e) => { e.stopPropagation(); if (window.confirm('Delete client?')) setClients(clients.filter(c => c.id !== client.id)); }} className="p-2 text-slate-400 hover:text-red-600"><Trash2 size={16} /></button>}
                        </div>
                        </td>
                    </tr>
                    ))}
                </tbody>
                </table>
            </div>
            </div>
        );

        const renderInventory = () => (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="p-4 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div className="relative flex-1 max-w-md">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                <input type="text" placeholder="Search SKU, Brand, Model..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>
                <button onClick={openAddInventoryModal} className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm transition-all"><Plus size={18} /> <span>Add Item</span></button>
            </div>
            <div className="overflow-x-auto">
                <table className="w-full text-left">
                <thead>
                    <tr className="bg-slate-50 border-b border-slate-200">
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Item ID & SKU</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Brand / Model</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-center">Qty</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Buy Cost (DP)</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Landed Price (Calc)</th>
                    <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th>
                    </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                    {filteredInventory.map((item) => {
                    const landedPrice = item.buyCost + item.freight + item.services + item.incidentals;
                    return (
                        <tr key={item.id} className="hover:bg-slate-50 transition-colors group">
                        <td className="px-6 py-4">
                            <p className="text-xs font-mono font-bold text-slate-400 mb-1">{item.id}</p>
                            <p className="font-bold text-blue-600">{item.sku}</p>
                        </td>
                        <td className="px-6 py-4 max-w-xs">
                            <p className="font-semibold text-slate-900 truncate">{item.brandModel}</p>
                            <p className="text-xs text-slate-500 truncate">{item.description}</p>
                        </td>
                        <td className="px-6 py-4 text-center">
                            <span className={`px-3 py-1 rounded-full text-xs font-bold ${item.qty < 3 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                            {item.qty}
                            </span>
                        </td>
                        <td className="px-6 py-4 text-sm text-slate-600 font-medium">{formatPHP(item.buyCost)}</td>
                        <td className="px-6 py-4">
                            <p className="text-sm font-bold text-slate-900">{formatPHP(landedPrice)}</p>
                            <p className="text-[10px] text-slate-400">Total Markup: +{formatPHP(landedPrice - item.buyCost)}</p>
                        </td>
                        <td className="px-6 py-4 text-right">
                            <div className="flex justify-end space-x-1 opacity-0 group-hover:opacity-100">
                            <button onClick={() => openEditInventoryModal(item)} className="p-2 text-slate-400 hover:text-blue-600"><Edit2 size={16} /></button>
                            {canDelete && <button onClick={() => handleDeleteInventory(item.id)} className="p-2 text-slate-400 hover:text-red-600"><Trash2 size={16} /></button>}
                            </div>
                        </td>
                        </tr>
                    );
                    })}
                </tbody>
                </table>
            </div>
            </div>
        );

        const renderSalesman = () => {
            const totalTarget = salesmen.reduce((acc, s) => acc + s.target[salesTimeframe], 0);
            const totalActual = salesmen.reduce((acc, s) => acc + s.actual[salesTimeframe], 0);
            const totalGPTarget = salesmen.reduce((acc, s) => acc + (s.targetGP?.[salesTimeframe] || 0), 0);
            const totalGPActual = salesmen.reduce((acc, s) => acc + (s.gp?.[salesTimeframe] || 0), 0);

            return (
            <div className="space-y-6">
                <div className="flex items-center justify-between">
                <div className="flex items-center space-x-2 bg-white p-1 rounded-lg border">
                    {['month', 'quarter', 'ytd'].map(t => (
                    <button key={t} onClick={() => setSalesTimeframe(t)} className={`px-4 py-2 text-xs font-bold uppercase rounded-md transition-all ${salesTimeframe === t ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                        {t === 'ytd' ? 'Year to Date' : t}
                    </button>
                    ))}
                </div>
                {(currentUser.role === 'Admin' || currentUser.role === 'Manager') && (
                    <button onClick={openAddSalesModal} className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm transition-all"><UserCheck size={18} /> <span>Add Salesperson</span></button>
                )}
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <StatCard label="Sales Target" value={formatPHP(totalTarget)} icon={Target} color="bg-slate-500" />
                <StatCard label="Actual Sales" value={formatPHP(totalActual)} trend={`${totalTarget > 0 ? ((totalActual/totalTarget)*100).toFixed(1) : 0}%`} icon={TrendingUp} color="bg-blue-500" />
                <StatCard label="GP Target" value={formatPHP(totalGPTarget)} icon={PieChart} color="bg-indigo-500" />
                <StatCard label="Actual GP" value={formatPHP(totalGPActual)} trend={`${totalGPTarget > 0 ? ((totalGPActual/totalGPTarget)*100).toFixed(1) : 0}%`} icon={DollarSign} color="bg-green-500" />
                </div>
                <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                <div className="p-4 border-b bg-slate-50/50">
                    <h3 className="font-bold text-slate-800">Salesman Performance Matrix</h3>
                </div>
                <table className="w-full text-left">
                    <thead>
                    <tr className="bg-slate-50 border-b">
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Salesman</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Sales Ach.</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">GP Target</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Actual GP</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">GP Ach.</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th>
                    </tr>
                    </thead>
                    <tbody className="divide-y">
                    {salesmen.map(s => {
                        const salesAch = s.target[salesTimeframe] > 0 ? (s.actual[salesTimeframe] / s.target[salesTimeframe]) * 100 : 0;
                        const gpTargetVal = s.targetGP?.[salesTimeframe] || 0;
                        const gpActualVal = s.gp?.[salesTimeframe] || 0;
                        const gpAch = gpTargetVal > 0 ? (gpActualVal / gpTargetVal) * 100 : 0;

                        return (
                        <tr key={s.id} className="hover:bg-slate-50 group transition-all">
                            <td className="px-6 py-4 font-semibold text-slate-900">{s.name}</td>
                            <td className="px-6 py-4">
                            <div className="flex items-center space-x-2">
                                <div className="flex-1 h-1.5 w-24 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-blue-600 rounded-full" style={{ width: `${Math.min(salesAch, 100)}%` }}></div>
                                </div>
                                <span className="text-[10px] font-bold text-slate-600">{salesAch.toFixed(1)}%</span>
                            </div>
                            </td>
                            <td className="px-6 py-4 text-xs text-slate-500 font-medium">{formatPHP(gpTargetVal)}</td>
                            <td className="px-6 py-4 text-sm font-bold text-green-600">{formatPHP(gpActualVal)}</td>
                            <td className="px-6 py-4">
                            <span className={`px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-tighter ${gpAch >= 100 ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                                {gpAch.toFixed(1)}%
                            </span>
                            </td>
                            <td className="px-6 py-4 text-right">
                            {canEditTargets && (
                                <div className="flex justify-end space-x-1 opacity-0 group-hover:opacity-100">
                                    <button onClick={() => openEditSalesModal(s)} className="p-2 text-slate-400 hover:text-blue-600 transition-colors"><Edit2 size={16} /></button>
                                    <button onClick={() => handleDeleteSalesman(s.id)} className="p-2 text-slate-400 hover:text-red-600 transition-colors"><Trash2 size={16} /></button>
                                </div>
                            )}
                            </td>
                        </tr>
                        );
                    })}
                    </tbody>
                </table>
                </div>
            </div>
            );
        };

        const renderQuotationMaker = () => (
            <div className="space-y-6">
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="p-4 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div className="relative flex-1 max-w-md">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                    <input type="text" placeholder="Search Quote ID, Client..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>
                <button onClick={openAddQuotationModal} className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm transition-all"><FilePlus size={18} /> <span>Create Quotation</span></button>
                </div>
                <div className="overflow-x-auto">
                <table className="w-full text-left">
                    <thead>
                    <tr className="bg-slate-50 border-b border-slate-200">
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Quote ID</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Client</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Status</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Total Amount</th>
                        <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th>
                    </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                    {filteredQuos.map((quo) => (
                        <tr key={quo.id} className="hover:bg-slate-50 transition-colors group">
                        <td className="px-6 py-4"><span className="text-xs font-mono font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">{quo.id}</span></td>
                        <td className="px-6 py-4 text-sm font-semibold text-slate-900">{getClientName(quo.clientId)}</td>
                        <td className="px-6 py-4">
                            <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded border ${quo.status === 'Converted' ? 'bg-green-50 text-green-600 border-green-200' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                            {quo.status}
                            </span>
                        </td>
                        <td className="px-6 py-4 text-sm font-bold text-blue-600">{formatPHP(quo.totalAmount)}</td>
                        <td className="px-6 py-4 text-right">
                            <div className="flex justify-end space-x-2">
                            {quo.status !== 'Converted' && (
                                <button onClick={() => openConvertModal(quo)} title="Convert to Sales Order" className="p-2 text-slate-400 hover:text-green-600 bg-slate-50 hover:bg-green-50 rounded-lg transition-colors">
                                <ClipboardCheck size={16} />
                                </button>
                            )}
                            <button onClick={() => { setViewingQuotation(quo); setIsPreviewModalOpen(true); }} title="Print Preview" className="p-2 text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-blue-50 rounded-lg transition-colors"><Printer size={16} /></button>
                            
                            {quo.status !== 'Converted' ? (
                                <>
                                <button onClick={() => openEditQuotationModal(quo)} title="Edit Quotation" className="p-2 text-slate-400 hover:text-amber-600 bg-slate-50 hover:bg-amber-50 rounded-lg transition-colors"><Edit2 size={16} /></button>
                                {canDelete && <button onClick={() => { if(window.confirm('Are you sure you want to delete this quotation?')) setQuotations(quotations.filter(q => q.id !== quo.id)); }} title="Delete Quotation" className="p-2 text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={16} /></button>}
                                </>
                            ) : (
                                <span className="p-2 text-slate-300 cursor-not-allowed flex items-center justify-center" title="Locked: Converted to Sales Order">
                                    <Lock size={16} />
                                </span>
                            )}
                            </div>
                        </td>
                        </tr>
                    ))}
                    {filteredQuos.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">No quotations found.</td></tr>}
                    </tbody>
                </table>
                </div>
            </div>
            </div>
        );

        const renderSalesOrders = () => (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="p-4 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div className="relative flex-1 max-w-md">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                        <input type="text" placeholder="Search SO ID, PO Number, Client..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                    </div>
                </div>
                <div className="overflow-x-auto">
                    <table className="w-full text-left">
                        <thead>
                            <tr className="bg-slate-50 border-b border-slate-200">
                                <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Sales Order Info</th>
                                <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Fulfillment</th>
                                <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Status</th>
                                <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Total Amount</th>
                                <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {filteredSalesOrders.map((so) => (
                                <tr key={so.id} className="hover:bg-slate-50 transition-colors group">
                                    <td className="px-6 py-4">
                                        <p className="font-bold text-slate-900">{getClientName(so.clientId)}</p>
                                        <div className="flex items-center mt-1">
                                            <span className="text-xs font-mono font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded mr-2">{so.id}</span>
                                            <span className="text-[10px] text-slate-400">Date: {so.dateConverted}</span>
                                        </div>
                                    </td>
                                    <td className="px-6 py-4">
                                        <p className="text-sm font-semibold text-slate-700">{so.distributor}</p>
                                        <p className="text-xs text-slate-500 font-mono">PO: {so.poNumber}</p>
                                    </td>
                                    <td className="px-6 py-4">
                                        <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded border 
                                            ${so.status === 'Invoiced' ? 'bg-purple-50 text-purple-600 border-purple-200' : 
                                            'bg-amber-50 text-amber-600 border-amber-200'}`}>
                                            {so.status}
                                        </span>
                                        {so.invoiceNumber && <p className="text-[10px] text-slate-400 font-mono mt-1">{so.invoiceNumber}</p>}
                                    </td>
                                    <td className="px-6 py-4 text-sm font-bold text-slate-900">{formatPHP(so.totalAmount)}</td>
                                    <td className="px-6 py-4 text-right">
                                        <div className="flex justify-end space-x-2">
                                            <button onClick={() => openSOPreview(so)} title="Internal Breakdown Preview" className="p-2 text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-blue-50 rounded-lg transition-colors">
                                                <Printer size={16} />
                                            </button>
                                            {so.status !== 'Invoiced' && (
                                                <button onClick={() => openForwardARModal(so)} title="Generate Invoice / Forward to AR" className="p-2 text-slate-400 hover:text-purple-600 bg-slate-50 hover:bg-purple-50 rounded-lg transition-colors">
                                                    <Send size={16} />
                                                </button>
                                            )}
                                            {canDelete && (
                                                <button onClick={() => { if(window.confirm('Delete this Sales Order?')) setSalesOrders(salesOrders.filter(s => s.id !== so.id)); }} className="p-2 text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 rounded-lg transition-colors">
                                                    <Trash2 size={16} />
                                                </button>
                                            )}
                                        </div>
                                    </td>
                                </tr>
                            ))}
                            {filteredSalesOrders.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">No sales orders found.</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const renderAR = () => {
            // Calculate AR Metrics - Only include items that are not 'Paid'
            // Prioritize showing items that have an invoiceNumber, or old ones that are pending
            const unpaidInvoices = salesOrders.filter(so => so.paymentStatus !== 'Paid');
            const totalReceivable = unpaidInvoices.reduce((sum, so) => sum + (so.totalAmount - (so.amountPaid || 0)), 0);
            
            // Process aging for all unpaid invoices
            const agingData = unpaidInvoices.map(so => {
            const { dueDate, diffDays, bucket, terms } = calculateAging(so);
            return { ...so, dueDate, diffDays, bucket, terms, balance: so.totalAmount - (so.amountPaid || 0) };
            });

            const totalOverdue = agingData.filter(d => d.diffDays > 0).reduce((sum, d) => sum + d.balance, 0);
            const totalPaid = salesOrders.reduce((sum, so) => sum + (so.amountPaid || 0), 0);
            const grandTotal = salesOrders.reduce((sum, so) => sum + so.totalAmount, 0);
            const collectionEfficiency = grandTotal > 0 ? (totalPaid / grandTotal) * 100 : 0;

            // Bucket aggregates
            const buckets = {
            'Current': agingData.filter(d => d.bucket === 'Current').reduce((sum, d) => sum + d.balance, 0),
            '1-30 Days': agingData.filter(d => d.bucket === '1-30 Days').reduce((sum, d) => sum + d.balance, 0),
            '31-60 Days': agingData.filter(d => d.bucket === '31-60 Days').reduce((sum, d) => sum + d.balance, 0),
            '61-90 Days': agingData.filter(d => d.bucket === '61-90 Days').reduce((sum, d) => sum + d.balance, 0),
            '> 90 Days': agingData.filter(d => d.bucket === '> 90 Days').reduce((sum, d) => sum + d.balance, 0),
            };

            return (
            <div className="space-y-6">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <StatCard label="Total Receivable" value={formatPHP(totalReceivable)} icon={Wallet} color="bg-blue-500" />
                <StatCard label="Total Overdue" value={formatPHP(totalOverdue)} trend={`${totalReceivable > 0 ? ((totalOverdue/totalReceivable)*100).toFixed(1) : 0}% of AR`} icon={AlertCircle} color="bg-red-500" />
                <StatCard label="Collection Efficiency" value={`${collectionEfficiency.toFixed(1)}%`} icon={PieChart} color="bg-green-500" />
                </div>

                {/* Aging Buckets Visualization */}
                <div className="grid grid-cols-5 gap-2">
                {Object.keys(buckets).map(bucket => {
                    const val = buckets[bucket];
                    const isCritical = bucket !== 'Current' && val > 0;
                    return (
                    <div key={bucket} className={`p-4 rounded-lg border ${isCritical ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200'} text-center`}>
                        <p className={`text-xs font-bold uppercase ${isCritical ? 'text-red-500' : 'text-slate-400'}`}>{bucket}</p>
                        <p className={`font-bold text-lg mt-1 ${isCritical ? 'text-red-700' : 'text-slate-700'}`}>{val > 0 ? formatPHP(val) : '-'}</p>
                    </div>
                    )
                })}
                </div>

                {/* Invoice List */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="p-4 border-b flex items-center justify-between">
                    <h3 className="font-bold text-slate-800 flex items-center"><FileText size={20} className="mr-2 text-blue-600"/> Outstanding Invoices</h3>
                    <div className="relative max-w-xs">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                    <input type="text" placeholder="Search Client, Inv #..." className="w-full pl-9 pr-4 py-1.5 bg-slate-50 border rounded-lg text-sm focus:outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                    </div>
                </div>
                <div className="overflow-x-auto">
                    <table className="w-full text-left">
                    <thead>
                        <tr className="bg-slate-50 border-b border-slate-200">
                            <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Invoice & Client</th>
                            <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Terms & Due Date</th>
                            <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Aging</th>
                            <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Balance Due</th>
                            <th className="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                        {agingData
                            .filter(d => 
                            d.id.toLowerCase().includes(searchTerm.toLowerCase()) || 
                            getClientName(d.clientId).toLowerCase().includes(searchTerm.toLowerCase()) ||
                            (d.invoiceNumber && d.invoiceNumber.toLowerCase().includes(searchTerm.toLowerCase()))
                            )
                            .sort((a,b) => b.diffDays - a.diffDays) // Sort by most overdue
                            .map(inv => (
                            <tr key={inv.id} className="hover:bg-slate-50 transition-colors">
                            <td className="px-6 py-4">
                                {inv.invoiceNumber ? (
                                    <p className="font-bold text-blue-700 text-sm">{inv.invoiceNumber}</p>
                                ) : (
                                    <p className="font-bold text-slate-400 text-sm italic">Pending Invoice</p>
                                )}
                                <p className="text-[10px] text-slate-400 font-mono">{inv.id}</p>
                                <p className="text-xs text-slate-600 font-medium mt-0.5">{getClientName(inv.clientId)}</p>
                                <p className="text-[10px] text-slate-400 mt-1">Inv Date: {inv.invoiceDate || inv.dateConverted}</p>
                            </td>
                            <td className="px-6 py-4">
