                                <td className="border border-slate-200 px-1 py-2 text-right bg-slate-50">{formatPHP(item.buyCost || 0)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-right bg-slate-50 text-slate-500">{formatPHP(item.freight || 0)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-right bg-slate-50 text-slate-500">{formatPHP(item.services || 0)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-right bg-slate-50 text-slate-500">{formatPHP(item.incidentals || 0)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-right bg-slate-100 font-semibold">{formatPHP(item.landed)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-right font-bold">{formatPHP(unitSRP)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-right font-bold bg-green-50 text-green-700">{formatPHP(gpAmount)}</td>
                                <td className="border border-slate-200 px-1 py-2 text-center font-bold bg-green-50 text-green-700">{gpPercent.toFixed(1)}%</td>
                                </tr>
                            );
                            });
                        })()}
                        </tbody>
                    </table>
                    </div>

                    {/* Summary Block */}
                    <div className="break-inside-avoid page-break-inside-avoid">
                        {(() => {
                            const quote = quotations.find(q => q.id === viewingSalesOrder.quoteId);
                            if (quote) {
                                const totalLandedCost = quote.items.reduce((sum, item) => sum + (item.qty * item.landed), 0);
                                const globalCosts = parseFloat(quote.services || 0) + parseFloat(quote.incidentals || 0) + parseFloat(quote.commissions || 0);
                                const totalProjectCost = totalLandedCost + globalCosts;
                                const totalRevenue = quote.totalAmount;
                                const totalGP = totalRevenue - totalProjectCost;
                                const totalGPPercent = totalRevenue > 0 ? (totalGP / totalRevenue) * 100 : 0;

                                return (
                                    <div className="flex justify-end mt-auto">
                                    <div className="w-1/2 border border-slate-300 rounded-lg overflow-hidden text-sm">
                                        <div className="bg-slate-100 px-4 py-2 font-bold border-b border-slate-300">Financial Summary</div>
                                        <div className="p-4 space-y-2">
                                            <div className="flex justify-between text-slate-600">
                                                <span>Total Items Landed Cost:</span>
                                                <span>{formatPHP(totalLandedCost)}</span>
                                            </div>
                                            <div className="flex justify-between text-slate-600">
                                                <span>Global Adjustments (Svc/Inc/Comm):</span>
                                                <span>{formatPHP(globalCosts)}</span>
                                            </div>
                                            <div className="flex justify-between font-bold text-slate-900 border-t border-slate-200 pt-2">
                                                <span>Total Project Cost:</span>
                                                <span>{formatPHP(totalProjectCost)}</span>
                                            </div>
                                            <div className="flex justify-between font-bold text-blue-700 text-lg border-t border-slate-200 pt-2 mt-2">
                                                <span>Total Revenue (SRP):</span>
                                                <span>{formatPHP(totalRevenue)}</span>
                                            </div>
                                            <div className="bg-green-50 p-2 rounded flex justify-between items-center mt-2 border border-green-200">
                                                <span className="font-bold text-green-800 uppercase text-xs">Total Gross Profit</span>
                                                <div className="text-right">
                                                    <p className="font-black text-green-700">{formatPHP(totalGP)}</p>
                                                    <p className="text-xs font-bold text-green-600">{totalGPPercent.toFixed(2)}% Margin</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    </div>
                                );
                            }
                        })()}

                        {/* Signatories */}
                        <div className="mt-12 grid grid-cols-3 gap-8">
                            {/* Salesman */}
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase mb-8">Prepared By:</p>
                                <div className="border-b border-slate-900 mb-2"></div>
                                <p className="font-bold text-sm">{getSalespersonName(viewingSalesOrder.salespersonId)}</p>
                                <p className="text-xs text-slate-500">Sales Department</p>
                            </div>

                            {/* Sales Manager/Admin (Optional but usually part of the flow "to" accounting) */}
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase mb-8">Checked By:</p>
                                <div className="border-b border-slate-900 mb-2"></div>
                                <p className="font-bold text-sm">Sales Admin / Manager</p>
                            </div>

                            {/* Accounting */}
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase mb-8">Approved By:</p>
                                <div className="border-b border-slate-900 mb-2"></div>
                                <p className="font-bold text-sm">Accounting Department</p>
                            </div>
                        </div>
                    </div>

                </div>
                </div>
            )}

            {/* Edit Deal Modal */}
            {isDealModalOpen && editingDeal && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in zoom-in duration-200">
                        <div className="px-6 py-4 border-b flex items-center justify-between">
                            <h3 className="font-bold text-lg">Update Deal Status</h3>
                            <button onClick={() => setIsDealModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                        </div>
                        <div className="p-6 space-y-4">
                            <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 mb-4">
                                <p className="text-xs font-bold text-slate-500 uppercase">Deal Reference</p>
                                <p className="font-mono text-sm font-bold text-slate-900">{editingDeal.id}</p>
                                <p className="text-sm text-slate-600 mt-1">{getClientName(editingDeal.clientId)}</p>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Deal Stage</label>
                                <select 
                                    className="w-full px-3 py-2 border rounded-lg text-sm" 
                                    value={dealFormData.stage} 
                                    onChange={(e) => setDealFormData({...dealFormData, stage: e.target.value})}
                                >
                                    {DEAL_STAGES.map(stage => <option key={stage} value={stage}>{stage}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Target Closing Date</label>
                                <input 
                                    type="date" 
                                    className="w-full px-3 py-2 border rounded-lg text-sm" 
                                    value={dealFormData.targetClosing} 
                                    onChange={(e) => setDealFormData({...dealFormData, targetClosing: e.target.value})} 
                                />
                            </div>
                            
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Remarks / Notes</label>
                                <textarea 
                                    className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" 
                                    rows="3"
                                    placeholder="Add pipeline notes, next steps, or specific requirements here..."
                                    value={dealFormData.remarks} 
                                    onChange={(e) => setDealFormData({...dealFormData, remarks: e.target.value})} 
                                ></textarea>
                            </div>
                        </div>
                        <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t">
                            <button onClick={() => setIsDealModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                            <button onClick={handleSaveDeal} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">Update Deal</button>
                        </div>
                    </div>
                </div>
            )}

            {/* Forecast Report Modal */}
            {isReportModalOpen && (
                <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex flex-col items-center justify-start overflow-y-auto p-8 print:p-0 print:bg-white print:static print:block print:inset-auto print:overflow-visible">
                    <div className="flex items-center justify-between w-full max-w-[210mm] mb-6 print:hidden">
                        <h3 className="text-white font-bold text-xl flex items-center space-x-2"><BarChart4 size={24} /> <span>Forecast Report</span></h3>
                        <div className="flex items-center space-x-4">
                        <button onClick={() => window.print()} className="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg shadow-xl hover:bg-blue-700 transition-all flex items-center space-x-2"><Printer size={18} /> <span>Print Report</span></button>
                        <button onClick={() => setIsReportModalOpen(false)} className="p-2 text-white/50 hover:text-white transition-all"><X size={32} /></button>
                        </div>
                    </div>

                    <div className="bg-white w-full max-w-[210mm] min-h-[297mm] h-auto shadow-2xl p-[15mm] block print:shadow-none print:w-full print:p-[10mm] print:h-auto animate-in slide-in-from-bottom-4 duration-300 font-sans relative text-slate-900 leading-relaxed print:mx-auto">
                        <div className="flex justify-between items-center border-b-2 border-slate-900 pb-4 mb-8">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 uppercase">Sales Pipeline Forecast</h1>
                            <p className="text-sm text-slate-500 font-medium">Generated on {new Date().toLocaleDateString()}</p>
                        </div>
                        {companyLogo && <img src={companyLogo} alt="Logo" className="h-10 object-contain" />}
                        </div>

                        {/* This Month Section */}
                        <div className="mb-10">
                        <h2 className="text-lg font-bold text-white bg-slate-900 px-4 py-1 mb-4 inline-block rounded-r-full -ml-4 pl-8">Commit for This Month</h2>
                        <table className="w-full text-left text-sm">
                            <thead>
                                <tr className="border-b-2 border-slate-200">
                                    <th className="py-2 font-bold text-slate-500">Deal Ref</th>
                                    <th className="py-2 font-bold text-slate-500">Client</th>
                                    <th className="py-2 font-bold text-slate-500">Salesperson</th>
                                    <th className="py-2 font-bold text-slate-500">Target Date</th>
                                    <th className="py-2 font-bold text-slate-500 text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost' && isDateInThisMonth(d.targetClosing)).map(deal => (
                                    <tr key={deal.id} className="border-b border-slate-100">
                                        <td className="py-2 font-mono text-xs">{deal.id}</td>
                                        <td className="py-2 font-bold">{getClientName(deal.clientId)}</td>
                                        <td className="py-2">{getSalespersonName(deal.salespersonId)}</td>
                                        <td className="py-2">{new Date(deal.targetClosing).toLocaleDateString()}</td>
                                        <td className="py-2 text-right font-bold">{formatPHP(deal.totalAmount)}</td>
                                    </tr>
                                ))}
                                {filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost' && isDateInThisMonth(d.targetClosing)).length === 0 && (
                                    <tr><td colSpan="5" className="py-4 text-center text-slate-400 italic">No commits for this month.</td></tr>
                                )}
                                <tr className="bg-slate-50">
                                    <td colSpan="4" className="py-2 font-bold text-right pr-4">TOTAL FOR MONTH</td>
                                    <td className="py-2 text-right font-black text-blue-700">
                                        {formatPHP(filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost' && isDateInThisMonth(d.targetClosing)).reduce((sum, d) => sum + d.totalAmount, 0))}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        </div>

                        {/* This Quarter Section */}
                        <div>
                        <h2 className="text-lg font-bold text-white bg-slate-700 px-4 py-1 mb-4 inline-block rounded-r-full -ml-4 pl-8">Pipeline for This Quarter</h2>
                        <table className="w-full text-left text-sm">
                            <thead>
                                <tr className="border-b-2 border-slate-200">
                                    <th className="py-2 font-bold text-slate-500">Deal Ref</th>
                                    <th className="py-2 font-bold text-slate-500">Client</th>
                                    <th className="py-2 font-bold text-slate-500">Salesperson</th>
                                    <th className="py-2 font-bold text-slate-500">Target Date</th>
                                    <th className="py-2 font-bold text-slate-500 text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost' && isDateInThisQuarter(d.targetClosing)).map(deal => (
                                    <tr key={deal.id} className="border-b border-slate-100">
                                        <td className="py-2 font-mono text-xs">{deal.id}</td>
                                        <td className="py-2 font-bold">{getClientName(deal.clientId)}</td>
                                        <td className="py-2">{getSalespersonName(deal.salespersonId)}</td>
                                        <td className="py-2">{new Date(deal.targetClosing).toLocaleDateString()}</td>
                                        <td className="py-2 text-right font-bold">{formatPHP(deal.totalAmount)}</td>
                                    </tr>
                                ))}
                                {filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost' && isDateInThisQuarter(d.targetClosing)).length === 0 && (
                                    <tr><td colSpan="5" className="py-4 text-center text-slate-400 italic">No active pipeline for this quarter.</td></tr>
                                )}
                                <tr className="bg-slate-50">
                                    <td colSpan="4" className="py-2 font-bold text-right pr-4">TOTAL FOR QUARTER</td>
                                    <td className="py-2 text-right font-black text-blue-700">
                                        {formatPHP(filteredDeals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost' && isDateInThisQuarter(d.targetClosing)).reduce((sum, d) => sum + d.totalAmount, 0))}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        </div>

                        <div className="mt-12 pt-4 border-t border-slate-200 text-xs text-slate-400 text-center">
                        End of Report • {filteredDeals.length} Total Active Deals in Pipeline
                        </div>
                    </div>
                </div>
            )}

            {/* Inventory Modal */}
            {isInventoryModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in duration-200">
                    <div className="px-6 py-4 border-b flex items-center justify-between">
                    <h3 className="font-bold text-lg">{editingInventory ? 'Edit Inventory Item' : 'Add New Item'}</h3>
                    <button onClick={() => setIsInventoryModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                    </div>
                    <div className="p-6 space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">SKU</label>
                        <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={inventoryFormData.sku} onChange={e => setInventoryFormData({...inventoryFormData, sku: e.target.value})} />
                        </div>
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Brand/Model</label>
                        <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={inventoryFormData.brandModel} onChange={e => setInventoryFormData({...inventoryFormData, brandModel: e.target.value})} />
                        </div>
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Description</label>
                        <textarea className="w-full px-3 py-2 border rounded-lg text-sm" rows="2" value={inventoryFormData.description} onChange={e => setInventoryFormData({...inventoryFormData, description: e.target.value})}>
                            
                        </textarea>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Quantity</label>
                        <input type="number" className="w-full px-3 py-2 border rounded-lg text-sm" value={inventoryFormData.qty} onChange={e => setInventoryFormData({...inventoryFormData, qty: parseInt(e.target.value) || 0})} />
                        </div>
                        <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Buy Cost (PHP)</label>
                        <input type="number" className="w-full px-3 py-2 border rounded-lg text-sm" value={inventoryFormData.buyCost} onChange={e => setInventoryFormData({...inventoryFormData, buyCost: parseFloat(e.target.value) || 0})} />
                        </div>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                        <div>
                        <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Freight</label>
                        <input type="number" className="w-full px-2 py-2 border rounded-lg text-xs" value={inventoryFormData.freight} onChange={e => setInventoryFormData({...inventoryFormData, freight: parseFloat(e.target.value) || 0})} />
                        </div>
                        <div>
                        <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Services</label>
                        <input type="number" className="w-full px-2 py-2 border rounded-lg text-xs" value={inventoryFormData.services} onChange={e => setInventoryFormData({...inventoryFormData, services: parseFloat(e.target.value) || 0})} />
                        </div>
                        <div>
                        <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Incidentals</label>
                        <input type="number" className="w-full px-2 py-2 border rounded-lg text-xs" value={inventoryFormData.incidentals} onChange={e => setInventoryFormData({...inventoryFormData, incidentals: parseFloat(e.target.value) || 0})} />
                        </div>
                    </div>
                    </div>
                    <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t">
                    <button onClick={() => setIsInventoryModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                    <button onClick={handleSaveInventory} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">Save Item</button>
                    </div>
                </div>
                </div>
            )}

            {/* Salesman Modal */}
            {isSalesModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in duration-200">
                    <div className="px-6 py-4 border-b flex items-center justify-between">
                    <h3 className="font-bold text-lg">{editingSalesman ? 'Edit Salesperson' : 'Add New Salesperson'}</h3>
                    <button onClick={() => setIsSalesModalOpen(false)}><X size={20} className="text-slate-400 hover:text-slate-600" /></button>
                    </div>
                    <div className="p-6 space-y-4">
                    <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Full Name</label>
                        <input type="text" className="w-full px-3 py-2 border rounded-lg text-sm" value={salesFormData.name} onChange={e => setSalesFormData({...salesFormData, name: e.target.value})} />
                    </div>
                    
                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <p className="text-xs font-bold text-slate-500 uppercase mb-3">Revenue Targets</p>
                        <div className="grid grid-cols-3 gap-2">
                            <div>
                                <label className="text-[10px] text-slate-400 font-bold block mb-1">Monthly</label>
                                <input type="number" className="w-full px-2 py-1 border rounded text-xs" value={salesFormData.target.month} onChange={e => setSalesFormData({...salesFormData, target: {...salesFormData.target, month: parseFloat(e.target.value) || 0}})} />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-400 font-bold block mb-1">Quarterly</label>
                                <input type="number" className="w-full px-2 py-1 border rounded text-xs" value={salesFormData.target.quarter} onChange={e => setSalesFormData({...salesFormData, target: {...salesFormData.target, quarter: parseFloat(e.target.value) || 0}})} />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-400 font-bold block mb-1">YTD (Annual)</label>
                                <input type="number" className="w-full px-2 py-1 border rounded text-xs" value={salesFormData.target.ytd} onChange={e => setSalesFormData({...salesFormData, target: {...salesFormData.target, ytd: parseFloat(e.target.value) || 0}})} />
                            </div>
                        </div>
                    </div>

                    <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <p className="text-xs font-bold text-blue-600 uppercase mb-3">Gross Profit (GP) Targets</p>
                        <div className="grid grid-cols-3 gap-2">
                            <div>
                                <label className="text-[10px] text-blue-400 font-bold block mb-1">Monthly GP</label>
                                <input type="number" className="w-full px-2 py-1 border rounded text-xs border-blue-200" value={salesFormData.targetGP.month} onChange={e => setSalesFormData({...salesFormData, targetGP: {...salesFormData.targetGP, month: parseFloat(e.target.value) || 0}})} />
                            </div>
                            <div>
                                <label className="text-[10px] text-blue-400 font-bold block mb-1">Quarterly GP</label>
                                <input type="number" className="w-full px-2 py-1 border rounded text-xs border-blue-200" value={salesFormData.targetGP.quarter} onChange={e => setSalesFormData({...salesFormData, targetGP: {...salesFormData.targetGP, quarter: parseFloat(e.target.value) || 0}})} />
                            </div>
                            <div>
                                <label className="text-[10px] text-blue-400 font-bold block mb-1">YTD GP</label>
                                <input type="number" className="w-full px-2 py-1 border rounded text-xs border-blue-200" value={salesFormData.targetGP.ytd} onChange={e => setSalesFormData({...salesFormData, targetGP: {...salesFormData.targetGP, ytd: parseFloat(e.target.value) || 0}})} />
                            </div>
                        </div>
                    </div>

                    </div>
                    <div className="p-4 bg-slate-50 flex justify-end space-x-2 border-t">
                    <button onClick={() => setIsSalesModalOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                    <button onClick={handleSaveSalesman} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">Save Profile</button>
                    </div>
                </div>
                </div>
            )}
        </div>
        );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
